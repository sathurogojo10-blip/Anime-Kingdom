<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | සිංහල උපසිරසි</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: translateY(-8px); border: 2px solid #ffcc00; }
        #video-overlay { display: none; background: rgba(0,0,0,0.98); }
    </style>
</head>
<body>

<!-- Player Overlay -->
<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl relative">
        <div class="flex justify-between items-center mb-4">
            <h2 id="playing-title" class="text-[#ffcc00] font-bold truncate pr-4"></h2>
            <button onclick="stopVideo()" class="bg-red-600 px-4 py-1 rounded font-bold text-white">වැසීමට X</button>
        </div>
        <div class="aspect-video bg-black rounded-xl overflow-hidden border-2 border-[#ffcc00] shadow-2xl">
            <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- Nav -->
<nav class="flex items-center justify-between px-6 py-4 bg-black/95 sticky top-0 z-50 border-b border-white/10">
    <div class="flex items-center gap-3">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <div class="leading-tight">
            <span class="text-2xl font-black uppercase block">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
            <span class="text-[10px] text-gray-400 tracking-[0.2em] font-bold uppercase">Sinhala Subs Portal</span>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="p-8 max-w-7xl mx-auto">
    <h2 class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest mb-8 text-[#ffcc00]">ජනප්‍රිය ඇනිමේ (Trending)</h2>
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- AI Loading... -->
    </div>
</div>

<script>
    // මම මෙතන API එක වෙනස් කරලා තියෙන්නේ (අලුත්ම සහ ස්ථාවර එකක්)
    const API_URL = "https://api.jikan.moe";

    async function loadData() {
        const container = document.getElementById('grid-container');
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            if (data && data.data) {
                container.innerHTML = data.data.map(a => `
                    <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 relative group" onclick="playAnime('${a.title}')">
                        <img src="${a.images.jpg.large_image_url}" class="w-full h-64 object-cover">
                        <div class="p-3">
                            <h3 class="text-sm font-bold truncate group-hover:text-[#ffcc00] transition-colors">${a.title}</h3>
                            <p class="text-[10px] text-gray-500 mt-1">TOP RATED</p>
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) {
            container.innerHTML = "<p class='text-red-500 col-span-full text-center'>දත්ත ලබාගැනීමට නොහැකි විය. කරුණාකර පිටුව නැවත ලෝඩ් කරන්න (Refresh).</p>";
        }
    }

    function playAnime(title) {
        const overlay = document.getElementById('video-overlay');
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-title').innerText = "නරඹන්නේ: " + title;
        
        // මෙය ඇනිමේ එකේ වීඩියෝව සෙවීමට පාවිච්චි වන ලින්ක් එකයි
        frame.src = `https://www.youtube.com{title}+sinhala+sub`;
        overlay.style.display = 'flex';
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
    }

    window.onload = loadData;
</script>

</body>
</html>
