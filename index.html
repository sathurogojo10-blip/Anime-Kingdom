<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Pro Stream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #e50914; --bg: #050505; --card-bg: #111111; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 80px; overflow-x: hidden; }
        
        /* Navigation & Hero */
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: white; cursor: pointer; }
        .hero { padding: 40px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), var(--bg)), url('https://wallpaperaccess.com'); background-size: cover; background-position: center; }
        .search-box { display: flex; max-width: 500px; margin: 20px auto; border-radius: 25px; overflow: hidden; border: 2px solid var(--accent); }
        #searchInput { flex: 1; height: 45px; background: rgba(0,0,0,0.8); border: none; padding: 0 20px; color: white; outline: none; }
        .search-btn { height: 45px; padding: 0 20px; background: var(--accent); color: white; border: none; cursor: pointer; }

        /* Home Content */
        .row-section { padding: 25px 0 0 15px; }
        .row-title { font-size: 19px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid var(--accent); padding-left: 12px; }
        .anime-row { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scrollbar-width: none; }
        .anime-row::-webkit-scrollbar { display: none; }
        .card { min-width: 145px; max-width: 145px; background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title { font-size: 13px; padding: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Advanced Player Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; }
        .modal-header { padding: 10px 15px; background: #111; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .back-btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .main-player-area { flex: 1; position: relative; background: #000; overflow: hidden; }
        #mainVFrame { width: 100%; height: 100%; border: none; }

        /* Overlays on Player */
        .player-overlay-btn { position: absolute; background: rgba(0,0,0,0.6); color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; z-index: 10; }
        .skip-btn { bottom: 80px; right: 20px; border-color: var(--accent); display: none; }
        .fullscreen-btn { top: 20px; right: 20px; }

        /* Footer Controls */
        .modal-footer { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; }
        .controls-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .p-btn { background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; font-size: 12px; }
        
        .quality-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .q-btn { background: #111; color: #888; border: 1px solid #333; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .q-btn.active { color: white; border-color: var(--accent); }

        .episode-list { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .ep-chip { background: #1a1a1a; color: #ccc; border: 1px solid #333; padding: 8px 15px; border-radius: 5px; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .ep-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <nav class="top-nav"><div class="logo" onclick="location.reload()">ANIME<span style="color:var(--accent)">KINGDOM</span></div></nav>

    <div class="hero">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Anime නම මෙතැනට..." onkeypress="if(event.key === 'Enter') searchAnime()">
            <button class="search-btn" onclick="searchAnime()"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div id="homeContent">
        <div class="row-section"><div class="row-title">TRENDING NOW</div><div id="trendingGrid" class="anime-row"></div></div>
        <div class="row-section"><div class="row-title">POPULAR SERIES</div><div id="popularGrid" class="anime-row"></div></div>
    </div>

    <!-- Pro Player Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closePlayer()"><i class="fas fa-chevron-left"></i> BACK</button>
            <span id="playingTitle" style="font-size: 13px; font-weight: bold;">Loading...</span>
            <div style="width: 50px;"></div> <!-- Spacer -->
        </div>
        
        <div class="main-player-area" id="playerArea">
            <iframe id="mainVFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
            
            <!-- Fullscreen Button -->
            <button class="player-overlay-btn fullscreen-btn" onclick="toggleFullScreen()"><i class="fas fa-expand"></i> Full Screen</button>
            
            <!-- Skip Intro (Simulated) -->
            <button id="skipIntro" class="player-overlay-btn skip-btn" onclick="skipIntro()">Skip Intro +85s</button>
        </div>

        <div class="modal-footer">
            <div class="quality-row">
                <span style="font-size: 11px; color: #555; align-self: center;">QUALITY: </span>
                <button class="q-btn" onclick="setQuality(this)">480p</button>
                <button class="q-btn active" onclick="setQuality(this)">720p</button>
                <button class="q-btn" onclick="setQuality(this)">1080p</button>
            </div>

            <div class="controls-row">
                <button class="p-btn" onclick="changeEp(-1)"><i class="fas fa-backward"></i> PREV</button>
                <button class="p-btn" onclick="changeEp(1)">NEXT <i class="fas fa-forward"></i></button>
            </div>

            <div class="episode-list" id="epList"></div>
            
            <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 11px; color: #444;">Subtitles: <input type="file" style="font-size: 10px;"></span>
                <span style="font-size: 10px; color: var(--accent);"><i class="fas fa-bolt"></i> Fast Server</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item"><i class="fas fa-fire"></i><br>Trending</div>
        <div class="nav-item"><i class="fas fa-bookmark"></i><br>Watchlist</div>
    </div>

    <script>
        const API = "https://graphql.anilist.co";
        let currentAnime = ""; let currentEpNum = 1;

        window.onload = () => {
            fetchAnime("sort: TRENDING_DESC", "trendingGrid");
            fetchAnime("sort: POPULARITY_DESC", "popularGrid");
        };

        async function fetchAnime(filter, gridId) {
            const query = `query { Page(perPage: 12) { media(${filter}, type: ANIME) { title { english romaji } coverImage { large } } } }`;
            try {
                const res = await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({query}) });
                const data = await res.json();
                const grid = document.getElementById(gridId);
                grid.innerHTML = data.data.Page.media.map(a => {
                    const t = a.title.english || a.title.romaji;
                    return `<div class="card" onclick="openPlayer('${t.replace(/'/g, "")}')"><img src="${a.coverImage.large}"><div class="card-title">${t}</div></div>`;
                }).join('');
            } catch (e) { console.log("error"); }
        }

        function openPlayer(title) {
            currentAnime = title; currentEpNum = 1;
            document.getElementById('playerModal').style.display = 'flex';
            updateVideo();
            generateEpList();
            
            // ප්ලේයර් එක ඕපන් වෙලා තත්පර 5කට පස්සේ Skip Intro පෙන්වීම
            setTimeout(() => { document.getElementById('skipIntro').style.display = 'block'; }, 5000);
        }

        function updateVideo() {
    const frame = document.getElementById('mainVFrame');
    document.getElementById('playingTitle').innerText = `${currentAnime} - Episode ${currentEpNum}`;
    
    // මේ ලින්ක් එක පාවිච්චි කරන්න, මේක ගොඩක් වෙලාවට වැඩ කරනවා
    // vidsrc.to හෝ vidsrc.xyz කියන සර්වර් දෙකම මාරුවෙන් මාරුවට ටෙස්ට් කරන්න පුළුවන්
    const vUrl = `https://vidsrc.to{encodeURIComponent(currentAnime.toLowerCase().replace(/\s+/g, '-'))}/ep-${currentEpNum}`;
    
    frame.src = vUrl;
}

        function generateEpList() {
            const list = document.getElementById('epList');
            let html = "";
            for(let i=1; i<=24; i++) {
                html += `<div class="ep-chip ${i===currentEpNum?'active':''}" onclick="setEp(${i})">Episode ${i}</div>`;
            }
            list.innerHTML = html;
        }

        function setEp(n) { currentEpNum = n; updateVideo(); generateEpList(); }
        function changeEp(s) { currentEpNum += s; if(currentEpNum < 1) currentEpNum = 1; updateVideo(); generateEpList(); }

        // --- NEW PRO FEATURES ---
        function toggleFullScreen() {
            const el = document.getElementById('playerArea');
            if (!document.fullscreenElement) {
                el.requestFullscreen().catch(err => { alert("Error: " + err.message); });
            } else {
                document.exitFullscreen();
            }
        }

        function skipIntro() {
            // ඇත්තටම skip කරන්න නම් player API එක ඕනේ, 
            // මෙතනදී අපි server එක refresh කරලා simulate කරනවා (හෝ user ට දැනුම් දෙනවා)
            alert("Skipping Intro (85s)... Please wait for buffer.");
            document.getElementById('skipIntro').style.display = 'none';
        }

        function setQuality(btn) {
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Quality එක server එකෙන් මාරු වෙද්දී පොඩි refresh එකක් වෙන්න ඕනේ
            updateVideo();
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('mainVFrame').src = "";
            if(document.fullscreenElement) document.exitFullscreen();
        }

        function searchAnime() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            document.getElementById('homeContent').innerHTML = `<div class="row-section"><div class="row-title">Results: ${q}</div><div class="anime-row" id="searchGrid"></div></div>`;
            fetchAnime(`search: "${q}"`, "searchGrid");
        }
    </script>
</body>
</html>
