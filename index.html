<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Hi-Stream Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        @import url('https://fonts.googleapis.com');
        :root { --accent: #ff0000; --bg: #050505; --card-bg: #111; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; overflow-x: hidden; }
        
        /* Premium Header & Search Bar */
        header { position: fixed; top: 0; width: 100%; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent); }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #fff; text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .search-area { display: flex; width: 95%; max-width: 450px; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 4px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        #searchInput { flex: 1; background: transparent; border: none; padding: 0 15px; color: white; outline: none; font-size: 14px; }
        .search-btn { background: var(--accent); border: none; color: white; width: 45px; height: 38px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Hero Section */
        .hero { position: relative; width: 100%; height: 75vh; background: linear-gradient(to top, var(--bg), transparent), url('https://images.alphacoders.com'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 30px; margin-bottom: 20px; }
        .hero-content { max-width: 500px; margin-top: 80px; }
        .hero-content h1 { font-size: 40px; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }

        /* Anime Rows */
        .row-section { padding: 15px 0 0 20px; }
        .row-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .anime-row { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; }
        .card { min-width: 140px; background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: scale(1.05); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-title { font-size: 11px; padding: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- PRO PLAYER MODAL (HiAnime Bridge) --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .player-box { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; transition: 0.4s; background: rgba(0,0,0,0.5); }
        .hud-hidden { opacity: 0; pointer-events: none; }
        .hud-top, .hud-bottom { padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: center; }
        .hud-bottom { background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); flex-direction: column; gap: 12px; padding-bottom: 40px; }

        .btn-ui { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-sec { background: rgba(255,255,255,0.1); border: 1px solid #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ANIME<span>KINGDOM</span></div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="ඇනිමේ නම සොයන්න..." onkeypress="if(event.key==='Enter') searchAnime()">
            <button class="search-btn" onclick="searchAnime()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1 id="bannerTitle">BLACK CLOVER</h1>
            <p>Asta and Yuno were abandoned together at the same church and have been inseparable since.</p>
            <button class="btn-ui" onclick="playAnime('black-clover-bc09', 'Black Clover')"><i class="fas fa-play"></i> WATCH NOW</button>
        </div>
    </div>

    <div id="homeContent">
        <div class="row-section"><div class="row-title">TRENDING NOW</div><div id="trendingGrid" class="anime-row"></div></div>
        <div class="row-section"><div class="row-title">POPULAR SERIES</div><div id="popularGrid" class="anime-row"></div></div>
    </div>

    <!-- The Player Modal -->
    <div id="playerModal" class="modal">
        <div class="player-box" id="pArea" onclick="handleHUD()">
            <!-- HiAnime / Mega Cloud Server Integration -->
            <iframe id="vFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
            
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:50;"></div>

            <div id="hud" class="hud-overlay">
                <div class="hud-top">
                    <button class="btn-ui btn-sec" onclick="closePlayer()">◀ BACK</button>
                    <span id="pTitle" style="font-size: 14px; font-weight: bold;">Loading...</span>
                    <button class="btn-ui btn-sec" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
                </div>

                <div class="hud-bottom">
                    <div style="display:flex; gap:15px;">
                        <button class="btn-ui btn-sec" onclick="changeEp(-1)">PREV</button>
                        <button class="btn-ui" onclick="alert('HiAnime Fast Server Active')">HI-SERVER</button>
                        <button class="btn-ui btn-sec" onclick="changeEp(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://graphql.anilist.co";
        let curSlug = ""; let curTitle = ""; let curEp = 1; let hT;

        window.onload = () => { 
            fetchData("sort: TRENDING_DESC", "trendingGrid"); 
            fetchData("sort: POPULARITY_DESC", "popularGrid"); 
        };

        async function fetchData(f, gridId) {
            const query = `query{Page(perPage:15){media(${f},type:ANIME){title{english romaji}coverImage{large}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query})});
            const d = await res.json();
            document.getElementById(gridId).innerHTML = d.data.Page.media.map(a => {
                const t = a.title.english || a.title.romaji;
                const slug = t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                return `<div class="card" onclick="playAnime('${slug}', '${t.replace(/'/g,"")}')">
                    <img src="${a.coverImage.large}">
                    <div class="card-title">${t}</div>
                </div>`;
            }).join('');
        }

        function playAnime(slug, title) {
            curSlug = slug; curTitle = title; curEp = 1;
            document.getElementById('playerModal').style.display = 'flex';
            updateV(); showHUD();
        }

        function updateV() {
            document.getElementById('pTitle').innerText = `${curTitle} - Episode ${curEp}`;
            const frame = document.getElementById('vFrame');
            
            // HiAnime ලින්ක් එකෙන් වීඩියෝ එක ගෙන්නන ප්‍රධාන Logic එක
            // මෙතනදී HiAnime එකේ තියෙන MegaCloud හෝ ප්ලේයර් එකට පාලනය දෙනවා
            frame.src = `https://vidsrc.to{curSlug}/ep-${curEp}`;
        }

        function handleHUD() {
            const h = document.getElementById('hud');
            if(h.classList.contains('hud-hidden')) showHUD(); else h.classList.add('hud-hidden');
        }

        function showHUD() {
            const h = document.getElementById('hud');
            h.classList.remove('hud-hidden');
            clearTimeout(hT); hT = setTimeout(() => h.classList.add('hud-hidden'), 3500);
        }

        function toggleFS() {
            const p = document.getElementById('pArea');
            if(!document.fullscreenElement) p.requestFullscreen().catch(e=>e); else document.exitFullscreen();
        }

        function changeEp(s) { curEp += s; if(curEp < 1) curEp = 1; updateV(); }
        function closePlayer() { document.getElementById('playerModal').style.display='none'; document.getElementById('vFrame').src=""; }
        
        function searchAnime() {
            const v = document.getElementById('searchInput').value;
            if(!v) return;
            document.getElementById('homeContent').innerHTML = `<div class="row-section"><div class="row-title">ප්‍රතිඵල: ${v}</div><div class="anime-row" id="sGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));"></div></div>`;
            fetchData(`search:"${v}"`, "sGrid");
        }
    </script>
</body>
</html>
