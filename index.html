<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Hi-Stream Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        @import url('https://fonts.googleapis.com');
        :root { --accent: #ff0000; --bg: #050505; --card-bg: #111; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; overflow-x: hidden; }
        
        /* Premium Header & Search Fix */
        header { position: fixed; top: 0; width: 100%; padding: 15px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent); }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #fff; text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        /* Modern Search Bar with Visible Button */
        .search-area { display: flex; width: 95%; max-width: 450px; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 4px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        #searchInput { flex: 1; background: transparent; border: none; padding: 0 15px; color: white; outline: none; font-size: 14px; }
        .search-btn { background: var(--accent); border: none; color: white; width: 45px; height: 38px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .search-btn:hover { background: #cc0000; transform: scale(1.05); }

        /* Dynamic Hero Banner */
        .hero { position: relative; width: 100%; height: 80vh; background: linear-gradient(to top, var(--bg), transparent), url('https://images.alphacoders.com'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 30px; }
        .hero-content { max-width: 500px; margin-top: 100px; }
        .hero-content h1 { font-size: 42px; line-height: 1.1; margin-bottom: 10px; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 13px; color: #ccc; margin-bottom: 20px; line-height: 1.6; }

        /* Row Content */
        .row-section { padding: 25px 0 0 20px; }
        .row-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 12px; }
        .anime-row { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; }
        .anime-row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card { min-width: 140px; background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(255,0,0,0.2); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-title { font-size: 11px; padding: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }

        /* --- SMART PRO PLAYER MODAL --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .player-box { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; transition: 0.4s; background: rgba(0,0,0,0.5); }
        .hud-hidden { opacity: 0; pointer-events: none; }
        .hud-top, .hud-bottom { padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent); display: flex; justify-content: space-between; align-items: center; }
        .hud-bottom { background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); flex-direction: column; gap: 12px; padding-bottom: 35px; }

        .ui-btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .chip-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .chip { background: #222; border: 1px solid #444; padding: 5px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; color: #888; }
        .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ANIME<span>KINGDOM</span></a>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="ඇනිමේ නම සොයන්න..." onkeypress="if(event.key==='Enter') searchAnime()">
            <!-- මෙන්න ඔයා ඉල්ලපු Search Button එක -->
            <button class="search-btn" onclick="searchAnime()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </header>

    <div class="hero">
        <div class="hero-content">
            <span style="background:var(--accent); padding:3px 8px; border-radius:4px; font-size:10px; font-weight:bold;">#1 ON STREAMING</span>
            <h1>JUJUTSU KAISEN</h1>
            <p>Itadori Yuji eats a cursed finger and enters a world of sorcerers to find Sukuna's remaining parts.</p>
            <button class="ui-btn" onclick="playAnime(113415, 'Jujutsu Kaisen')"><i class="fas fa-play"></i> WATCH NOW</button>
        </div>
    </div>

    <div id="homeContent">
        <div class="row-section"><div class="row-title">TRENDING NOW</div><div id="trendingGrid" class="anime-row"></div></div>
        <div class="row-section"><div class="row-title">POPULAR SERIES</div><div id="popularGrid" class="anime-row"></div></div>
    </div>

    <!-- Smart Player Modal (HiAnime Integrated) -->
    <div id="playerModal" class="modal">
        <div class="player-box" id="pArea" onclick="handleHUD()">
            <iframe id="vFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
            
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:50;"></div>

            <div id="hud" class="hud-overlay">
                <div class="hud-top">
                    <button class="ui-btn" style="background:#222;" onclick="closePlayer()">◀ BACK</button>
                    <div style="text-align:center;">
                        <span id="pTitle" style="font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">Loading...</span>
                        <div class="chip-row" id="serverRow">
                            <div class="chip active" onclick="setServ(1, this)">HiAnime (Vidsrc)</div>
                            <div class="chip" onclick="setServ(2, this)">Server 2</div>
                        </div>
                    </div>
                    <button class="ui-btn" style="background:#222;" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
                </div>

                <div class="hud-bottom">
                    <div class="chip-row">
                        <span style="font-size: 9px; color: #888; align-self: center;">QUALITY:</span>
                        <div class="chip active">Auto (480p-1080p)</div>
                    </div>
                    <div style="display:flex; gap:12px;">
                        <button class="ui-btn" style="background:rgba(255,255,255,0.1);" onclick="changeEp(-1)">PREV</button>
                        <button class="ui-btn" onclick="alert('Intro Skipped')">SKIP INTRO</button>
                        <button class="ui-btn" style="background:rgba(255,255,255,0.1);" onclick="changeEp(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://graphql.anilist.co";
        let curID, curT, curE = 1, curS = 1, hT;

        window.onload = () => { 
            fetchData("sort: TRENDING_DESC", "trendingGrid"); 
            fetchData("sort: POPULARITY_DESC", "popularGrid"); 
        };

        async function fetchData(f, gridId) {
            const query = `query{Page(perPage:15){media(${f},type:ANIME){id title{english romaji}coverImage{large}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query})});
            const d = await res.json();
            document.getElementById(gridId).innerHTML = d.data.Page.media.map(a => {
                const t = a.title.english || a.title.romaji;
                return `<div class="card" onclick="playAnime(${a.id}, '${t.replace(/'/g,"")}')">
                    <img src="${a.coverImage.large}" loading="lazy">
                    <div class="card-title">${t}</div>
                </div>`;
            }).join('');
        }

        function playAnime(id, title) {
            curID = id; curT = title; curE = 1;
            document.getElementById('playerModal').style.display = 'flex';
            updateV(); showHUD();
        }

        function updateV() {
            document.getElementById('pTitle').innerText = `${curT} - Episode ${curE}`;
            const frame = document.getElementById('vFrame');
            // HiAnime සර්වර්ස් හා සමාන වේගවත් සර්වර්ස් (Vidsrc.to) පාවිච්චි කිරීම
            frame.src = curS === 1 ? `https://vidsrc.to{curID}/ep-${curE}` : `https://vidsrc.xyz{curID}&episode=${curE}`;
        }

        function handleHUD() {
            const h = document.getElementById('hud');
            if(h.classList.contains('hud-hidden')) showHUD(); else h.classList.add('hud-hidden');
        }

        function showHUD() {
            const h = document.getElementById('hud');
            h.classList.remove('hud-hidden');
            clearTimeout(hT); hT = setTimeout(() => h.classList.add('hud-hidden'), 3500);
        }

        function setServ(s, el) {
            curS = s; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); updateV(); showHUD();
        }

        function toggleFS() {
            const p = document.getElementById('pArea');
            if(!document.fullscreenElement) p.requestFullscreen().then(() => screen.orientation.lock("landscape").catch(e=>e));
            else document.exitFullscreen();
        }

        function changeEp(s) { curE += s; if(curE<1) curE=1; updateV(); showHUD(); }
        function closePlayer() { document.getElementById('playerModal').style.display='none'; document.getElementById('vFrame').src=""; }
        
        function searchAnime() {
            const v = document.getElementById('searchInput').value;
            if(!v) return;
            document.getElementById('homeContent').innerHTML = `<div class="row-section"><div class="row-title">ප්‍රතිඵල: ${v}</div><div class="anime-row" id="sGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));"></div></div>`;
            fetchData(`search:"${v}"`, "sGrid");
        }
    </script>
</body>
</html>
