<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Powered by HiAnime Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #0b0c10; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: scale(1.05); border: 2px solid #ffcc00; box-shadow: 0 0 20px rgba(255, 204, 0, 0.5); }
        #player-overlay { display: none; background: rgba(0,0,0,0.98); }
        .ep-btn { background: #1f2833; border: 1px solid #45a29e; transition: 0.3s; }
        .ep-btn:hover, .active-ep { background: #ffcc00; color: black; border-color: #ffcc00; }
        iframe { border-radius: 15px; background: black; border: 2px solid #1f2833; }
    </style>
</head>
<body>

<!-- Global Video Player Overlay -->
<div id="player-overlay" class="fixed inset-0 z-50 flex flex-col p-4 md:p-8 overflow-y-auto">
    <div class="max-w-6xl mx-auto w-full">
        <div class="flex justify-between items-center mb-6">
            <h2 id="playing-title" class="text-xl md:text-3xl font-black text-[#ffcc00] uppercase italic"></h2>
            <button onclick="closePlayer()" class="bg-red-600 px-6 py-2 rounded-full font-bold shadow-lg hover:bg-red-700 transition">CLOSE X</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div class="aspect-video w-full relative shadow-2xl">
                    <!-- Aniwatch/Zoro Styled Player -->
                    <iframe id="main-video" src="" class="w-full h-full" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                </div>
                <div class="mt-6 flex flex-wrap gap-4">
                    <button onclick="downloadAction('video')" class="bg-green-600 px-6 py-2 rounded-lg font-bold flex items-center hover:bg-green-700 transition"><i class="fas fa-download mr-2"></i> DOWNLOAD VIDEO</button>
                    <button onclick="downloadAction('sub')" class="bg-blue-600 px-6 py-2 rounded-lg font-bold flex items-center hover:bg-blue-700 transition"><i class="fas fa-file-alt mr-2"></i> SINHALA SUBTITLE</button>
                </div>
            </div>

            <!-- Episode Selector -->
            <div class="bg-[#1f2833] p-6 rounded-2xl border border-white/10 h-[500px] flex flex-col">
                <h3 class="font-bold mb-4 border-b border-white/10 pb-2 text-[#45a29e]"><i class="fas fa-play-circle mr-2"></i> EPISODES</h3>
                <div id="episode-list" class="grid grid-cols-4 gap-2 overflow-y-auto pr-2 custom-scroll">
                    <!-- Episodes load here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nav -->
<nav class="flex flex-col md:flex-row items-center justify-between px-8 py-6 bg-[#0b0c10] sticky top-0 z-40 border-b border-[#45a29e]/30 gap-6 backdrop-blur-md">
    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
        <i class="fas fa-bolt text-[#ffcc00] text-4xl"></i>
        <div class="leading-none">
            <span class="text-3xl font-black uppercase tracking-tighter block">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em]">Advanced Streaming Engine</span>
        </div>
    </div>
    <div class="relative w-full md:w-1/3">
        <input type="text" id="userSearch" oninput="handleSearch()" placeholder="Search from Aniwatch Database..." class="w-full bg-[#1f2833] border border-white/10 rounded-full py-3 px-12 focus:border-[#ffcc00] outline-none text-white shadow-inner">
        <i class="fas fa-search absolute left-5 top-4 text-gray-500"></i>
    </div>
</nav>

<!-- Content -->
<div class="p-8 max-w-7xl mx-auto">
    <h2 id="section-title" class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest mb-10 text-[#ffcc00]">Latest Releases</h2>
    <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- Loading UI -->
    </div>
</div>

<script>
    // AniList API used for Metadata
    const API_URL = 'https://graphql.anilist.co';
    let currentAnimeData = { id: '', title: '', ep: 1 };

    async function fetchAnime(query, vars = {}) {
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: vars }) });
        return res.json();
    }

    async function init() {
        const query = `query { Page(perPage: 24) { media(sort: TRENDING_DESC, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
        const { data } = await fetchAnime(query);
        drawGrid(data.Page.media);
    }

    async function handleSearch() {
        const term = document.getElementById('userSearch').value;
        if(term.length > 2) {
            const query = `query ($s: String) { Page(perPage: 18) { media(search: $s, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
            const { data } = await fetchAnime(query, { s: term });
            drawGrid(data.Page.media);
        } else if(term.length === 0) init();
    }

    function drawGrid(list) {
        const grid = document.getElementById('anime-grid');
        grid.innerHTML = list.map(a => {
            const t = a.title.english || a.title.romaji;
            return `
            <div class="anime-card bg-[#1f2833] rounded-xl overflow-hidden cursor-pointer transition-all duration-300" onclick="launchPlayer('${a.idMal}', '${t.replace(/'/g, "")}', ${a.episodes || 12})">
                <img src="${a.coverImage.large}" class="w-full h-64 object-cover">
                <div class="p-3"><h3 class="text-[11px] font-bold truncate uppercase text-center">${t}</h3></div>
            </div>`;
        }).join('');
    }

    function launchPlayer(id, title, eps) {
        currentAnimeData = { id, title, ep: 1 };
        document.getElementById('playing-title').innerText = title;
        document.getElementById('player-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        const listDiv = document.getElementById('episode-list');
        listDiv.innerHTML = '';
        for(let i = 1; i <= (eps || 1); i++) {
            listDiv.innerHTML += `<button onclick="loadStream(${i})" class="ep-btn py-3 rounded-lg font-bold text-xs">${i}</button>`;
        }
        loadStream(1);
    }

    function loadStream(ep) {
        currentAnimeData.ep = ep;
        // Aniwatch/HiAnime style streaming using vidsrc engine
        document.getElementById('main-video').src = `https://vidsrc.cc{currentAnimeData.id}/${ep}`;
        
        const buttons = document.querySelectorAll('.ep-btn');
        buttons.forEach((b, idx) => {
            if(idx + 1 === ep) b.classList.add('active-ep');
            else b.classList.remove('active-ep');
        });
    }

    function downloadAction(type) {
        const q = encodeURIComponent(currentAnimeData.title);
        if(type === 'video') window.open(`https://www.google.com{q}+episode+${currentAnimeData.ep}+720p+direct+link`, '_blank');
        else window.open(`https://www.google.com{q}+sinhala+subtitle+download`, '_blank');
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('main-video').src = '';
        document.body.style.overflow = 'auto';
    }

    window.onload = init;
</script>

</body>
</html>
