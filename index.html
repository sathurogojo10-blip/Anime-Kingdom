<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Drive Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #121212; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        
        header { padding: 20px; background: #000; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--accent); }

        .container { padding: 40px 20px; max-width: 800px; margin: auto; }
        .upload-box { background: var(--card); padding: 30px; border-radius: 15px; border: 2px dashed #333; margin-bottom: 30px; }
        
        input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; margin-bottom: 15px; }
        .btn { background: var(--accent); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #playerContainer { display: none; margin-top: 20px; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: auto; border: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ANIME<span>KINGDOM</span></div>
    </header>

    <div class="container">
        <!-- Google Drive Section -->
        <div class="upload-box">
            <i class="fab fa-google-drive" style="font-size: 40px; color: #34A853; margin-bottom: 10px;"></i>
            <h3>Google Drive වීඩියෝව ප්ලේ කරන්න</h3>
            <p style="font-size: 13px; color: #888;">Drive ලින්ක් එක (Share Link) මෙතැනට paste කරන්න</p>
            
            <input type="text" id="driveUrl" placeholder="https://drive.google.com...">
            <br>
            <button class="btn" onclick="playDriveVideo()">PLAY VIDEO</button>
        </div>

        <!-- Video Player -->
        <div id="playerContainer">
            <video id="myPlayer" controls autoplay>
                ඔබේ Browser එක මෙයට සහය නොදක්වයි.
            </video>
            <div style="padding: 15px; background: #111; text-align: left;">
                <h4 id="vidTitle">Now Playing from Drive</h4>
            </div>
        </div>
    </div>

    <script>
        // 1. HiAnime සඳහා නිවැරදි URL එක සෑදීමේ ක්‍රමය (ඔබේ කලින් වැරදුණු කොටස)
        function goToHiAnime(title, ep) {
            // නිවැරදි සංකේතය backtick (`) මිස තනි උද්ධෘත පාඨ (') නොවේ
            const searchUrl = `https://hianime.to{encodeURIComponent(title + " episode " + ep)}`;
            window.open(searchUrl, '_blank');
        }

        // 2. Google Drive වීඩියෝව ප්ලේ කිරීම
        function playDriveVideo() {
            const rawUrl = document.getElementById('driveUrl').value;
            const playerContainer = document.getElementById('playerContainer');
            const videoElement = document.getElementById('myPlayer');

            if (!rawUrl) return alert("කරුණාකර ලින්ක් එකක් ඇතුළත් කරන්න!");

            // Drive Link එක Direct Player Link එකක් බවට පත් කිරීම
            let fileId = "";
            try {
                if (rawUrl.includes("file/d/")) {
                    fileId = rawUrl.split("file/d/")[1].split("/")[0];
                } else if (rawUrl.includes("id=")) {
                    fileId = rawUrl.split("id=")[1].split("&")[0];
                }

                if (fileId) {
                    // Drive direct link format
                    const directLink = `https://www.googleapis.com{fileId}?alt=media&key=ඔබේ_API_KEY_එක_මෙහි_යොදන්න`;
                    
                    // සරල ක්‍රමය: බොහෝවිට Drive preview embed එක භාවිතා වේ
                    // නමුත් මෙහිදී සෘජුවම Video Tag එකට දැමීමට නම් Google API අවශ්‍යයි.
                    // සරලවම ප්ලේ කිරීමට පහත URL එක උත්සාහ කරන්න:
                    const proxyUrl = `https://drive.google.com{fileId}`;
                    
                    videoElement.src = proxyUrl;
                    playerContainer.style.display = 'block';
                    videoElement.play();
                } else {
                    alert("වලංගු Google Drive ලින්ක් එකක් ලබා දෙන්න.");
                }
            } catch (e) {
                alert("ලින්ක් එකේ දෝෂයක් ඇත.");
            }
        }
    </script>
</body>
</html>
