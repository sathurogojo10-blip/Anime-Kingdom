<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom - Stream Your Favorite Anime</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #ffcc00; --bg: #0b0b0b; --card-bg: #1a1a1a; --accent: #ff4500; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Header */
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        
        .search-box { display: flex; gap: 8px; }
        input { padding: 10px 15px; border-radius: 5px; border: 1px solid #333; width: 200px; outline: none; background: #111; color: #fff; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: var(--primary); color: #000; cursor: pointer; font-weight: bold; }

        /* Player Section */
        #player-section { display: none; padding: 30px 5%; background: #000; text-align: center; }
        .video-wrapper { max-width: 900px; margin: 0 auto; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 2px solid var(--primary); border-radius: 10px; }
        
        /* Episode List Styles */
        .ep-container { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .ep-btn { background: #222; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .ep-btn:hover { background: var(--primary); color: #000; }

        /* Grid */
        .container { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 10px; font-size: 13px; text-align: center; }
        
        .loader { text-align: center; margin-top: 50px; color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">Anime Kingdom</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search anime...">
        <button onclick="searchAnime()">SEARCH</button>
    </div>
</nav>

<!-- Video & Episode Player -->
<div id="player-section">
    <div class="video-wrapper">
        <h2 id="videoTitle" style="color:var(--primary)"></h2>
        <iframe id="mainPlayer" src="" allowfullscreen frameborder="0"></iframe>
        <h3>Episodes</h3>
        <div id="episodeList" class="ep-container">
            <!-- Episode buttons will appear here -->
        </div>
        <br>
        <button onclick="closePlayer()" style="background:#333; color:#fff">CLOSE PLAYER</button>
    </div>
</div>

<div class="container">
    <h2 id="listTitle">🔥 Trending Now</h2>
    <div id="animeGrid" class="grid"></div>
</div>

<script>
    const grid = document.getElementById('animeGrid');
    const playerSection = document.getElementById('player-section');
    const player = document.getElementById('mainPlayer');
    const videoTitle = document.getElementById('videoTitle');
    const epList = document.getElementById('episodeList');

    // 1. Load Trending Anime
    async function loadTrending() {
        grid.innerHTML = '<div class="loader">Entering the Kingdom...</div>';
        const res = await fetch('https://api.jikan.moe');
        const data = await res.json();
        renderCards(data.data);
    }

    // 2. Search Anime
    async function searchAnime() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        grid.innerHTML = '<div class="loader">Searching...</div>';
        const res = await fetch(`https://api.jikan.moe{query}&limit=20`);
        const data = await res.json();
        renderCards(data.data);
    }

    // 3. Display Cards
    function renderCards(list) {
        grid.innerHTML = '';
        list.forEach(anime => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                <div class="card-info"><b>${anime.title}</b></div>
            `;
            card.onclick = () => showEpisodes(anime);
            grid.appendChild(card);
        });
    }

    // 4. Show Episodes (Logic)
    function showEpisodes(anime) {
        window.scrollTo({top: 0, behavior: 'smooth'});
        videoTitle.innerText = anime.title;
        playerSection.style.display = 'block';
        
        // Episode ගණන අනුව බටන් සෑදීම (උදාහරණයක් ලෙස උපරිම 12ක් පෙන්වයි)
        const totalEp = anime.episodes || 12;
        epList.innerHTML = '';
        
        for(let i=1; i <= totalEp; i++) {
            const btn = document.createElement('button');
            btn.className = 'ep-btn';
            btn.innerText = `Ep ${i}`;
            btn.onclick = () => playVideo(anime.title, i);
            epList.appendChild(btn);
        }
        
        // පලමු එපිසෝඩ් එක ප්ලේ කිරීම (Preview)
        playVideo(anime.title, 1);
    }

    // 5. Play Video (GogoAnime Embed Logic)
    function playVideo(title, ep) {
        // ඇනිමේ නම ලින්ක් එකකට ගැලපෙන ලෙස සකස් කිරීම
        const slug = title.toLowerCase().replace(/ /g, "-").replace(/[^\w-]+/g, "");
        // මෙය සැබෑ ඇනිමේ එම්බෙඩ් ප්ලේයර් එකකට උදාහරණයක් (නිරාවරණය වන සර්වර් අනුව වෙනස් වේ)
        const videoUrl = `https://www.youtube.com{title}+episode+${ep}+anime`;
        
        player.src = videoUrl;
    }

    function closePlayer() {
        playerSection.style.display = 'none';
        player.src = "";
    }

    loadTrending();
</script>

</body>
</html>
