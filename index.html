<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Kingdom | Elite Layout</title>
  <script src="https://unpkg.com"></script>
  <style>
    :root { --red: #ff3e3e; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
    
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: white; 
      font-family: 'Inter', sans-serif; overflow-x: hidden; 
      overscroll-behavior-y: contain;
    }

    /* Dynamic Immersive Background */
    #hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-size: cover; background-position: center;
      transition: background 0.8s ease; z-index: -2; filter: brightness(0.3);
    }
    
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background: linear-gradient(0deg, var(--bg) 20%, transparent 100%);
      z-index: -1;
    }

    header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
    .brand span { color: var(--red); }

    /* Modern Search Bar */
    .search-wrapper { padding: 0 25px; margin-bottom: 10px; }
    .search-container {
      display: flex; align-items: center; background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px;
      padding: 5px 15px; backdrop-filter: blur(15px);
    }
    .search-input {
      width: 100%; background: transparent !important; border: none !important;
      padding: 12px; color: white !important; outline: none !important; font-size: 16px;
    }

    /* Hero Content Area */
    .hero-info { padding: 10px 25px; min-height: 160px; display: flex; flex-direction: column; justify-content: flex-end; }
    .meta { font-size: 10px; font-weight: 800; color: var(--red); text-transform: uppercase; margin-bottom: 5px; }
    .title { font-size: 32px; font-weight: 900; margin: 0; line-height: 1.1; }
    .btn-watch {
      background: white; color: black; border: none; padding: 14px 40px; border-radius: 50px;
      font-weight: 900; font-size: 14px; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 15px;
    }

    /* Categories Styling */
    .category-section { margin-top: 25px; }
    .category-title { 
      padding: 0 25px; font-size: 16px; font-weight: 800; 
      text-transform: uppercase; letter-spacing: 1px; color: #eee;
      display: flex; align-items: center; gap: 8px;
    }
    .category-title::before { content: ''; width: 4px; height: 16px; background: var(--red); display: inline-block; border-radius: 2px; }

    /* Horizontal Menu Scroll */
    .menu-scroll {
      display: flex; overflow-x: auto; gap: 15px; padding: 15px 25px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .menu-scroll::-webkit-scrollbar { display: none; }
    
    .card { min-width: 100px; transition: 0.4s; cursor: pointer; text-align: center; }
    .card img { width: 100px; height: 140px; border-radius: 12px; object-fit: cover; border: 2px solid transparent; }
    .card.active img { border-color: white; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
    .card p { font-size: 10px; margin-top: 8px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }

    /* Modal Styling */
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:4000; display:none; backdrop-filter:blur(5px); }
    .player-modal { position:fixed; bottom:0; left:0; width:100%; background:#121212; border-radius:30px 30px 0 0; padding:25px; border-top:3px solid var(--red); animation:slideUp 0.3s; }
    @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .player-opt { display:flex; align-items:center; gap:15px; padding:15px; background:#1c1c1c; margin-bottom:10px; border-radius:15px; border:1px solid #333; }
  </style>
</head>
<body>

  <div id="hero-bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="brand">ANIME<span>KINGDOM</span></div>
    <div id="clock" style="font-size: 13px; font-weight: bold; opacity: 0.8;"></div>
  </header>

  <div class="search-wrapper">
    <div class="search-container">
      <i data-lucide="search" size="18" color="#ff3e3e"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search anime..." oninput="handleSearch()">
    </div>
  </div>

  <div class="hero-info">
    <div class="meta" id="h-genres">Action • Fantasy</div>
    <h1 class="title" id="h-title">Anime Kingdom</h1>
    <button class="btn-watch" onclick="showPlayerMenu()">
      <i data-lucide="play" fill="black" size="18"></i> WATCH NOW
    </button>
  </div>

  <!-- Category 1: Trending (පින්තූරයේ 1 වෙනි ඉතලයට අදාළව) -->
  <div class="category-section">
    <div class="category-title">Trending Now</div>
    <div class="menu-scroll" id="list-trending"></div>
  </div>

  <!-- Category 2: All Time Popular (පින්තූරයේ 2 වෙනි ඉතලයට අදාළව) -->
  <div class="category-section">
    <div class="category-title">Popular Series</div>
    <div class="menu-scroll" id="list-popular"></div>
  </div>

  <!-- Category 3: Top Rated (පින්තූරයේ 3 වෙනි ඉතලයට අදාළව) -->
  <div class="category-section" style="margin-bottom: 50px;">
    <div class="category-title">Top Rated</div>
    <div class="menu-scroll" id="list-top"></div>
  </div>

  <!-- Player Selection Modal -->
  <div id="modal-bg" class="modal-overlay" onclick="hidePlayerMenu()">
    <div class="player-modal" onclick="event.stopPropagation()">
      <h3 style="margin:0 0 20px 0; font-size:16px;">CHOOSE PLAYER</h3>
      <div class="player-opt" onclick="launchApp('splayer')"><i data-lucide="zap"></i><b>SPlayer</b></div>
      <div class="player-opt" onclick="launchApp('vlc')"><i data-lucide="cone"></i><b>VLC Player</b></div>
      <div class="player-opt" onclick="launchApp('mx')"><i data-lucide="play"></i><b>MX Player</b></div>
      <div class="player-opt" onclick="launchApp('browser')"><i data-lucide="globe"></i><b>Internal Player</b></div>
    </div>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let currentAnime = null;

    // විවිධ Categories සඳහා දත්ත ලබා ගැනීම
    async function fetchAllCategories() {
      // 1. Trending
      fetchData(`{Page(perPage:12){media(sort:TRENDING_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "list-trending");
      // 2. Popular
      fetchData(`{Page(perPage:12){media(sort:POPULARITY_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "list-popular");
      // 3. Top Rated
      fetchData(`{Page(perPage:12){media(sort:SCORE_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "list-top");
    }

    async function fetchData(query, containerId, vars = {}) {
      const res = await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({query, variables: vars}) });
      const json = await res.json();
      render(json.data.Page.media, containerId);
    }

    function render(list, id) {
      const container = document.getElementById(id);
      container.innerHTML = list.map((a, i) => `
        <div class="card" onclick="updateHero(${JSON.stringify(a).replace(/"/g, '&quot;')}, this)">
          <img src="${a.coverImage.large}">
          <p>${(a.title.english || a.title.romaji).substring(0,12)}</p>
        </div>`).join('');
      if(id === "list-trending" && list.length > 0) updateHero(list[0]);
    }

    function updateHero(anime, el) {
      currentAnime = anime;
      document.getElementById('hero-bg').style.backgroundImage = `url('${anime.bannerImage || anime.coverImage.extraLarge}')`;
      document.getElementById('h-title').innerText = anime.title.english || anime.title.romaji;
      document.getElementById('h-genres').innerText = anime.genres.join(" • ");

      if(el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }

    function showPlayerMenu() { if(currentAnime) document.getElementById('modal-bg').style.display='block'; }
    function hidePlayerMenu() { document.getElementById('modal-bg').style.display='none'; }

    function launchApp(type) {
      const streamUrl = `https://www.2embed.cc{currentAnime.id}/1`;
      const title = currentAnime.title.english || currentAnime.title.romaji;
      let url = (type === 'splayer') ? `intent:${streamUrl}#Intent;package=com.sentis.splayer;S.title=${encodeURIComponent(title)};end` :
                (type === 'vlc') ? `intent:${streamUrl}#Intent;package=org.videolan.vlc;S.title=${encodeURIComponent(title)};end` :
                (type === 'mx') ? `intent:${streamUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(title)};end` : streamUrl;
      
      if(type === 'browser') window.open(streamUrl, '_blank'); else window.location.href = url;
      hidePlayerMenu();
    }

    function handleSearch() {
      const val = document.getElementById('searchInput').value;
      if(val.length < 2) return;
      fetchData(`query($s:String){Page(perPage:12){media(search:$s,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "list-trending", {s:val});
    }

    fetchAllCategories();
    lucide.createIcons();
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
  </script>
</body>
</html>
