<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | All-in-One Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .page { display: none; }
        .active-page { display: block; }
        .nav-btn:hover { color: #ffcc00; }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="flex justify-between items-center px-8 py-5 bg-black/90 sticky top-0 z-50 border-b border-white/5">
    <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <span class="text-2xl font-black uppercase">ANIME <span class="text-[#ffcc00]">KINGDOM</span></span>
    </div>
    <div class="flex gap-8 font-bold text-sm uppercase tracking-widest">
        <button onclick="showPage('home')" class="nav-btn">HOME</button>
        <button onclick="showPage('shop')" class="nav-btn text-purple-400">OTT SHOP</button>
    </div>
</nav>

<!-- PAGE 1: HOME (Anime Grid) -->
<div id="home" class="page active-page p-8">
    <div class="mb-10 w-full md:w-1/3 mx-auto relative">
        <input type="text" id="searchInput" oninput="searchAnime()" placeholder="Anime සොයන්න..." class="w-full bg-zinc-900 border border-white/10 py-2 px-10 rounded-full outline-none focus:border-[#ffcc00]">
        <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
    </div>
    <h2 class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 mb-8 uppercase tracking-widest">Trending Now</h2>
    <div id="anime-grid" class="grid grid-cols-2 md:grid-cols-6 gap-6"></div>
</div>

<!-- PAGE 2: PLAYER (Streaming) -->
<div id="player" class="page p-8">
    <div class="max-w-5xl mx-auto">
        <button onclick="showPage('home')" class="mb-6 text-gray-400 hover:text-white"><i class="fas fa-arrow-left mr-2"></i> ආපසු යන්න</button>
        <h2 id="playing-title" class="text-2xl font-bold text-[#ffcc00] mb-4 uppercase"></h2>
        <div class="aspect-video w-full rounded-2xl overflow-hidden border-2 border-zinc-800 bg-black">
            <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="mt-8">
            <h3 class="font-bold mb-4 border-b border-white/5 pb-2">EPISODES</h3>
            <div id="ep-list" class="grid grid-cols-6 md:grid-cols-12 gap-2"></div>
        </div>
    </div>
</div>

<!-- PAGE 3: OTT SHOP -->
<div id="shop" class="page p-8">
    <div class="max-w-6xl mx-auto">
        <header class="text-center py-10">
            <h2 class="text-4xl font-black italic uppercase">CHEAP OTT <span class="text-[#ffcc00]">SHOP</span></h2>
            <p class="text-gray-400 mt-2 tracking-widest">Premium Accounts for Lowest Price</p>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-10">
            <div class="bg-zinc-900 p-8 rounded-3xl border border-white/5 text-center">
                <img src="https://upload.wikimedia.org" class="h-10 mx-auto mb-6">
                <h3 class="text-xl font-bold">Netflix Premium</h3>
                <p class="text-[#ffcc00] text-3xl font-black mt-4">Rs. 450</p>
                <button onclick="buy('Netflix')" class="mt-8 bg-white text-black w-full py-3 rounded-xl font-bold hover:bg-[#ffcc00]">මිලදී ගන්න</button>
            </div>
            <!-- තව OTT වර්ග මෙතනට එක් කළ හැක -->
        </div>
    </div>
</div>

<script>
    const API = 'https://graphql.anilist.co';
    let currentId = '';

    // පිටු මාරු කිරීමේ Logic එක
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        window.scrollTo(0,0);
        if(pageId !== 'player') document.getElementById('video-frame').src = '';
    }

    // Anime දත්ත ගෙන්වීම
    async function loadAnime(q = '') {
        const query = q ? `query($s:String){Page(perPage:24){media(search:$s,type:ANIME){idMal title{english romaji}coverImage{large}episodes}}}` 
                      : `query{Page(perPage:24){media(sort:TRENDING_DESC,type:ANIME){idMal title{english romaji}coverImage{large}episodes}}}`;
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s:q}}) });
        const { data } = await res.json();
        const grid = document.getElementById('anime-grid');
        grid.innerHTML = data.Page.media.map(a => `
            <div class="cursor-pointer group" onclick="watch('${a.idMal}', '${(a.title.english||a.title.romaji).replace(/'/g,"")}', ${a.episodes || 12})">
                <img src="${a.coverImage.large}" class="h-64 w-full object-cover rounded-xl group-hover:border-2 border-[#ffcc00] transition-all">
                <p class="mt-3 text-[10px] font-bold truncate text-center uppercase tracking-tighter">${a.title.english||a.title.romaji}</p>
            </div>`).join('');
    }

    function searchAnime() { loadAnime(document.getElementById('searchInput').value); }

    function watch(id, title, eps) {
        currentId = id;
        document.getElementById('playing-title').innerText = title;
        const el = document.getElementById('ep-list');
        el.innerHTML = '';
        for(let i=1; i<=eps; i++) {
            el.innerHTML += `<button onclick="playEp(${i})" class="bg-zinc-800 p-2 rounded hover:bg-[#ffcc00] hover:text-black font-bold text-xs">${i}</button>`;
        }
        showPage('player');
        playEp(1);
    }

    function playEp(ep) {
        document.getElementById('video-frame').src = `https://vidsrc.cc{currentId}/${ep}`;
    }

    function buy(item) {
        window.open(`https://wa.me, මට ${item} account එකක් මිලදී ගැනීමට අවශ්‍යයි.`, '_blank');
    }

    window.onload = () => loadAnime();
</script>

</body>
</html>
