<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | HiAnime Edition</title>
    <style>
        :root {
            --primary: #ffdd95; /* HiAnime Yellow */
            --bg: #0f1113;
            --card-bg: #1a1c1e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Hero Banner */
        .hero {
            height: 400px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg)),
                        url('https://images.alphacoders.com'); /* Banner Image */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: var(--primary);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin: 0;
        }

        /* Category Section */
        .container { padding: 20px 5%; }
        
        .category-title {
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .anime-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .anime-card:hover { transform: scale(1.05); }

        .anime-card img { width: 100%; height: 250px; object-fit: cover; }

        .anime-card p { padding: 10px; font-size: 0.9rem; text-align: center; }

        /* Modal / Details Section */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            overflow-y: auto;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            margin: 5% auto;
            width: 80%;
            padding: 20px;
            border-radius: 10px;
        }

        .season-btn {
            background: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .season-btn.active { background: var(--primary); color: black; }

        .episode-list {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .episode-btn {
            background: #2a2c2f;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .episode-btn:hover { background: var(--primary); color: black; }
        
        .close-btn { float: right; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>ANIME KINGDOM</h1>
        <p>Watch High Quality Anime for Free</p>
    </section>

    <div class="container">
        <h2 class="category-title">Trending Now</h2>
        <div class="anime-grid">
            <!-- Sample Card -->
            <div class="anime-card" onclick="openDetails('Solo Leveling', 'solo-leveling-18718')">
                <img src="https://artworks.thetvdb.com" alt="Solo Leveling">
                <p>Solo Leveling</p>
            </div>
            <!-- Add more cards here -->
        </div>
    </div>

    <!-- Modal for Seasons and Episodes -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="animeTitle" style="color: var(--primary);"></h2>
            <hr>
            
            <h3>Seasons</h3>
            <div id="seasonTabs">
                <button class="season-btn active">Season 1</button>
                <button class="season-btn">Season 2</button>
            </div>

            <h3>Episodes</h3>
            <div class="episode-list" id="episodeContainer">
                <!-- Episodes will be generated here -->
            </div>
        </div>
    </div>

    <script>
        function openDetails(name, slug) {
            document.getElementById('animeTitle').innerText = name;
            const episodeContainer = document.getElementById('episodeContainer');
            episodeContainer.innerHTML = '';

            // උදාහරණයක් ලෙස Episode 12ක් ජනනය කිරීම
            for (let i = 1; i <= 12; i++) {
                const ep = document.createElement('a');
                ep.href = `https://hianime.to{slug}?ep=${i}`;
                ep.target = "_blank";
                ep.className = 'episode-btn';
                ep.innerText = 'Ep ' + i;
                episodeContainer.appendChild(ep);
            }

            document.getElementById('detailsModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = "none";
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('detailsModal')) {
                closeModal();
            }
        }
    </script>

</body>
</html>
