<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Kingdom | PS5 Elite</title>
  <script src="https://unpkg.com"></script>
  <style>
    :root { --red: #ff3e3e; --bg: #050505; --glass: rgba(255, 255, 255, 0.1); }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; }

    /* Dynamic Immersive Background */
    #hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover; background-position: center 20%;
      transition: background 1s ease-in-out; z-index: -2;
    }
    
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at top right, transparent, var(--bg) 90%),
                  linear-gradient(0deg, var(--bg) 20%, transparent 100%);
      z-index: -1;
    }

    header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
    .brand span { color: var(--red); }

    /* Search & Refresh Section */
    .action-bar { padding: 0 25px; display: flex; gap: 10px; align-items: center; }
    .search-bar {
      flex: 1; background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
      display: flex; align-items: center; padding: 2px 15px;
    }
    .search-input { width: 100%; background: none; border: none; padding: 12px; color: white; outline: none; }
    
    /* Refresh Button Styling */
    .refresh-btn {
      background: var(--glass); border: 1px solid rgba(255,255,255,0.15);
      color: white; padding: 12px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; transition: 0.3s;
    }
    .refresh-btn:active { transform: rotate(180deg); background: var(--red); }

    /* Info Display */
    .info-box { padding: 25px; min-height: 180px; display: flex; flex-direction: column; justify-content: flex-end; }
    .meta { font-size: 10px; font-weight: 800; color: var(--red); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
    .title { font-size: 32px; font-weight: 900; margin: 0; line-height: 1.1; }
    .desc { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; margin: 15px 0; height: 60px; overflow: hidden; }

    /* Horizontal Menu */
    .menu-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 20px 25px; scrollbar-width: none; }
    .menu-scroll::-webkit-scrollbar { display: none; }
    .card { min-width: 90px; transition: 0.4s; cursor: pointer; text-align: center; }
    .card img { width: 90px; height: 130px; border-radius: 12px; object-fit: cover; border: 2px solid transparent; }
    .card.active { transform: scale(1.1); }
    .card.active img { border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    .card p { font-size: 10px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.6; }
    .card.active p { opacity: 1; font-weight: bold; }

    .play-btn {
      background: white; color: black; border: none; padding: 14px 35px; border-radius: 30px;
      font-weight: 900; font-size: 14px; display: flex; align-items: center; gap: 8px; margin-top: 10px;
    }

    /* Player Overlay */
    #player-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black;
      z-index: 2000; display: none; flex-direction: column;
    }
  </style>
</head>
<body>

  <div id="hero-bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="brand">ANIME<span>KINGDOM</span></div>
    <div id="time" style="font-size: 13px; opacity: 0.7;"></div>
  </header>

  <div class="action-bar">
    <div class="search-bar">
      <i data-lucide="search" size="18" color="#ff3e3e"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search..." oninput="searchAnime()">
    </div>
    <!-- Refresh Button -->
    <button class="refresh-btn" onclick="refreshContent()" title="Refresh Data">
      <i data-lucide="rotate-cw" size="18"></i>
    </button>
  </div>

  <div class="info-box">
    <div class="meta" id="m-genres">...</div>
    <h1 class="title" id="m-title">Anime Kingdom</h1>
    <p class="desc" id="m-desc">Select an anime to start watching.</p>
    <button class="play-btn" onclick="playVideo()">
      <i data-lucide="play" fill="black" size="18"></i> WATCH NOW
    </button>
  </div>

  <div class="menu-scroll" id="anime-list"></div>

  <!-- Player -->
  <div id="player-screen">
    <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a;">
      <span id="p-title" style="font-size: 12px; font-weight: bold;"></span>
      <button onclick="closeVideo()" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px;">EXIT ×</button>
    </div>
    <iframe id="main-frame" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let currentData = null;

    // 1. Refresh Function (දත්ත අලුත් කිරීමට)
    async function refreshContent() {
      document.getElementById('searchInput').value = ''; // සර්ච් එක ක්ලියර් කරන්න
      await fetchAnime(`{Page(perPage:15){media(sort:TRENDING_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`);
    }

    async function fetchAnime(query, vars = {}) {
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, variables: vars })
        });
        const data = await res.json();
        renderItems(data.data.Page.media);
      } catch (e) { console.error("Error fetching data"); }
    }

    function renderItems(list) {
      const container = document.getElementById('anime-list');
      container.innerHTML = list.map((a, i) => `
        <div class="card ${i===0?'active':''}" onclick="selectItem(${JSON.stringify(a).replace(/"/g, '&quot;')}, this)">
          <img src="${a.coverImage.large}">
          <p>${(a.title.english || a.title.romaji).substring(0, 12)}</p>
        </div>
      `).join('');
      if(list.length > 0) selectItem(list[0]);
    }

    function selectItem(a, el) {
      currentData = a;
      document.getElementById('hero-bg').style.backgroundImage = `url('${a.bannerImage || a.coverImage.extraLarge}')`;
      document.getElementById('m-title').innerText = a.title.english || a.title.romaji;
      document.getElementById('m-desc').innerHTML = a.description;
      document.getElementById('m-genres').innerText = a.genres.join(" • ");

      if(el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }

    function searchAnime() {
      const val = document.getElementById('searchInput').value;
      if(val.length < 2) return;
      fetchAnime(`query($s:String){Page(perPage:10){media(search:$s,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, {s:val});
    }

    function playVideo() {
      if(!currentData) return;
      document.getElementById('p-title').innerText = currentData.title.english || currentData.title.romaji;
      document.getElementById('main-frame').src = `https://www.2embed.cc{currentData.id}/1`;
      document.getElementById('player-screen').style.display = 'flex';
    }

    function closeVideo() {
      document.getElementById('player-screen').style.display = 'none';
      document.getElementById('main-frame').src = '';
    }

    // Initial Load
    refreshContent();

    // Icons & Clock
    lucide.createIcons();
    setInterval(() => {
      document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);
  </script>
</body>
</html>
