<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Best Anime Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: scale(1.05); border: 2px solid #ffcc00; box-shadow: 0 0 20px rgba(255,204,0,0.3); }
        #video-overlay { display: none; background: rgba(0,0,0,0.98); }
    </style>
</head>
<body>

<!-- AI Video Player -->
<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl relative">
        <button onclick="stopVideo()" class="absolute -top-10 right-0 bg-red-600 px-4 py-1 rounded font-bold text-white">CLOSE X</button>
        <div class="aspect-video bg-black rounded-xl overflow-hidden border-2 border-[#ffcc00] shadow-2xl">
            <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- Nav -->
<nav class="flex items-center justify-between px-6 py-4 bg-black/90 sticky top-0 z-50 border-b border-white/10">
    <div class="flex items-center gap-3">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <span class="text-2xl font-black uppercase tracking-tighter">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
    </div>
    <div class="relative w-1/3">
        <input type="text" id="searchInput" oninput="searchKingdom()" placeholder="Search Anime..." class="w-full bg-zinc-900 border border-white/10 rounded-full py-2 px-10 focus:border-[#ffcc00] outline-none">
        <i class="fas fa-search absolute left-4 top-3 text-gray-500"></i>
    </div>
</nav>

<!-- Content -->
<div class="p-8">
    <h2 class="text-2xl font-bold mb-8 border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest">TRENDING NOW</h2>
    <div id="grid-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- AI Loading Screen -->
        <p id="loading-text" class="text-gray-500 animate-pulse">Gathering the Kingdom's treasures...</p>
    </div>
</div>

<script>
    // පාවිච්චි කරන්නේ Jikan API එකයි (වඩාත් ස්ථාවරයි)
    const API_URL = "https://api.jikan.moe";

    async function loadData() {
        try {
            const res = await fetch(`${API_URL}/top/anime`);
            const data = await res.json();
            renderList(data.data);
        } catch (e) {
            document.getElementById('loading-text').innerText = "සමාවෙන්න, දත්ත ලබාගැනීමට නොහැකි විය.";
        }
    }

    function renderList(list) {
        const container = document.getElementById('grid-container');
        container.innerHTML = list.map(a => `
            <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 relative group" onclick="playKingdom('${a.mal_id}', '${a.title}')">
                <img src="${a.images.jpg.large_image_url}" class="w-full h-64 object-cover">
                <div class="p-3">
                    <h3 class="text-sm font-bold truncate group-hover:text-[#ffcc00] transition-colors">${a.title}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[10px] bg-[#ffcc00] text-black font-bold px-2 py-0.5 rounded uppercase">TOP</span>
                        <span class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">HD</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function searchKingdom() {
        const q = document.getElementById('searchInput').value;
        if(q.length > 2) {
            const res = await fetch(`${API_URL}/anime?q=${q}`);
            const data = await res.json();
            renderList(data.data);
        }
    }

    function playKingdom(id, title) {
        const overlay = document.getElementById('video-overlay');
        const frame = document.getElementById('video-frame');
        
        // MyAnimeList ID එක පාවිච්චි කරලා Embed කරන එක
        frame.src = `https://www.youtube.com{title}+anime+episode+1`; 
        overlay.style.display = 'flex';
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
    }

    window.onload = loadData;
</script>

</body>
</html>
