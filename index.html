<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Instant Stream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #e50914; --bg: #08080a; --card-bg: #14141d; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        .hero-banner { position: relative; width: 100%; min-height: 380px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-info { position: relative; z-index: 10; text-align: center; width: 90%; }
        
        .search-container { display: flex; justify-content: center; margin: 25px auto; max-width: 600px; width: 95%; }
        #searchInput { flex: 1; height: 50px; background: rgba(0,0,0,0.8); border: 2px solid var(--accent); border-right: none; padding: 0 20px; color: white; border-radius: 30px 0 0 30px; outline: none; }
        .search-btn { height: 50px; padding: 0 30px; background: var(--accent); color: white; border: none; border-radius: 0 30px 30px 0; font-weight: bold; cursor: pointer; }

        .row-section { padding: 25px 0 0 20px; }
        .anime-row { display: flex; overflow-x: auto; gap: 15px; padding: 15px 5px; scrollbar-width: none; }
        .anime-row::-webkit-scrollbar { display: none; }

        .card { min-width: 160px; max-width: 160px; background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.1); border-color: var(--accent); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-title { font-size: 13px; padding: 10px 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .loader { text-align: center; padding: 20px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <nav class="top-nav"><div class="logo" onclick="location.reload()">ANIME<span style="color:var(--accent)">KINGDOM</span></div></nav>

    <div class="hero-banner">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img" onerror="this.src='https://wallpaperaccess.com'">
        <div class="hero-info">
            <h1 style="font-size: 32px;">UNLIMITED STREAMING</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Anime..." onkeypress="if(event.key === 'Enter') searchAnime()">
                <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div id="loader" class="loader">පූරණය වෙමින්...</div>

    <div class="row-section">
        <h2 id="gridTitle" style="font-size: 20px; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px;">Trending Now</h2>
        <div class="anime-row" id="animeGrid"></div>
    </div>

    <script>
        const API_URL = "https://graphql.anilist.co";

        window.onload = () => fetchAnime(`query { Page(perPage: 20) { media(sort: TRENDING_DESC, type: ANIME) { title { english romaji } coverImage { large } } } }`);

        async function fetchAnime(query) {
            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
                const data = await res.json();
                renderCards(data.data.Page.media);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function searchAnime() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('gridTitle').innerText = "Search Results";
            fetchAnime(`query { Page(perPage: 20) { media(search: "${q}", type: ANIME) { title { english romaji } coverImage { large } } } }`);
        }

        function renderCards(list) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = list.map(anime => {
                const title = anime.title.english || anime.title.romaji;
                return `
                <div class="card" onclick="watchNow('${title.replace(/'/g, "")}')">
                    <img src="${anime.coverImage.large}" referrerpolicy="no-referrer">
                    <div class="card-title">${title}</div>
                </div>`;
            }).join('');
        }

        // --- ලේසිම සහ ස්ථාවරම ක්‍රමය ---
        function watchNow(title) {
            // සයිට් එක ඇතුළෙ කරදර නොවී අලුත් ටැබ් එකක ප්ලේයර් එක විවෘත වේ.
            // මෙහිදී Seasons/Episodes ඔක්කොම ප්ලේයර් එක ඇතුළෙම තියෙනවා.
            const url = `https://vidsrc.me{encodeURIComponent(title)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
