<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Kingdom</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial; background:#121212; color:#fff; }
    header { background:#1f1f1f; padding:15px; display:flex; justify-content:space-between; flex-wrap:wrap; }
    header h1 { color:#3498db; font-size:22px; }
    nav a { color:#fff; margin:5px 10px; text-decoration:none; font-size:14px; }
    .search-bar { padding:15px; text-align:center; }
    .search-bar input { padding:8px; width:70%; border-radius:5px; border:none; }
    .search-bar button { padding:8px 12px; margin-left:5px; background:#e74c3c; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    .anime-card { background:#1f1f1f; border-radius:8px; margin:15px auto; padding:15px; max-width:500px; }
    .anime-card img { width:100%; border-radius:8px; }
    .anime-card h2 { color:#e74c3c; font-size:20px; margin:10px 0; }
    .anime-card p { font-size:14px; }
    footer { background:#1f1f1f; text-align:center; padding:10px; font-size:12px; margin-top:20px; }
  </style>
</head>
<body>
  <header>
    <h1>Anime Kingdom</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Categories</a>
      <a href="#">Popular</a>
      <a href="#">Latest</a>
      <a href="#">My List</a>
    </nav>
  </header>

  <!-- Search bar -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search anime...">
    <button onclick="searchAnime()">Search</button>
  </div>

  <!-- Results -->
  <div id="anime-container"></div>

  <footer>
    <p>© 2026 Anime Kingdom | Powered by AniList API</p>
  </footer>

  <script>
    async function searchAnime() {
      const searchTerm = document.getElementById("searchInput").value;
      if (!searchTerm) return;

      const query = `
        query ($search: String) {
          Media(search: $search, type: ANIME) {
            title { romaji english }
            description
            coverImage { large }
            episodes
            genres
          }
        }`;

      const response = await fetch("https://graphql.anilist.co", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ query, variables: { search: searchTerm } })
      });

      const data = await response.json();
      const anime = data.data.Media;

      document.getElementById("anime-container").innerHTML = `
        <div class="anime-card">
          <img src="${anime.coverImage.large}" alt="${anime.title.romaji}">
          <h2>${anime.title.english || anime.title.romaji}</h2>
          <p>${anime.description}</p>
          <p><b>Episodes:</b> ${anime.episodes || "N/A"}</p>
          <p><b>Genres:</b> ${anime.genres.join(", ")}</p>
        </div>`;
    }
  </script>
</body>
</html>
