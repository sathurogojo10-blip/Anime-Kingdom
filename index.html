<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Kingdom</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial; background:#121212; color:#fff; }
    header { background:#1f1f1f; padding:15px; display:flex; justify-content:space-between; flex-wrap:wrap; }
    header h1 { color:#3498db; font-size:22px; }
    nav a { color:#fff; margin:5px 10px; text-decoration:none; font-size:14px; }
    .hero { background:#1f1f1f; padding:20px; }
    .hero h2 { font-size:24px; margin:0; color:#e74c3c; }
    .hero p { font-size:14px; max-width:90%; }
    .hero button { margin-top:15px; padding:10px 15px; background:#e74c3c; border:none; color:#fff; cursor:pointer; border-radius:5px; font-size:14px; }
    .section { padding:15px 20px; }
    .section h2 { font-size:18px; margin-bottom:10px; color:#3498db; }
    .anime-list { display:flex; overflow-x:auto; gap:10px; }
    .anime-card { background:#1f1f1f; min-width:200px; border-radius:5px; overflow:hidden; flex-shrink:0; padding:10px; }
    .anime-card img { width:100%; height:250px; object-fit:cover; border-radius:5px; }
    .anime-card h3 { padding:8px; font-size:16px; color:#e74c3c; }
    .anime-card p { font-size:13px; padding:0 8px; }
    .player-container { display:flex; flex-direction:column; align-items:center; padding:20px; }
    video { width:100%; max-width:500px; border:2px solid #3498db; border-radius:10px; background:#000; }
    .episode-list { margin-top:15px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .episode { background:#1f1f1f; padding:8px 12px; border-radius:5px; cursor:pointer; font-size:13px; }
    .episode:hover { background:#e74c3c; }
    footer { background:#1f1f1f; text-align:center; padding:15px; margin-top:20px; font-size:12px; }
    @media (max-width:600px) {
      header { flex-direction:column; align-items:flex-start; }
      nav { margin-top:10px; }
      .hero h2 { font-size:20px; }
      .hero p { font-size:12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Anime Kingdom</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Categories</a>
      <a href="#">Popular</a>
      <a href="#">Latest</a>
      <a href="#">My List</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Featured Anime</h2>
    <p>Dynamic data from AniList API</p>
    <button onclick="playEpisode('episode1.mp4')">▶ Play Now</button>
  </section>

  <section class="section">
    <h2>Trending Anime</h2>
    <div id="anime-container" class="anime-list"></div>
  </section>

  <div class="player-container">
    <h2>Episode Player</h2>
    <video id="animePlayer" controls>
      <source src="episode1.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="episode-list">
      <div class="episode" onclick="playEpisode('episode1.mp4')">Episode 1</div>
      <div class="episode" onclick="playEpisode('episode2.mp4')">Episode 2</div>
      <div class="episode" onclick="playEpisode('episode3.mp4')">Episode 3</div>
    </div>
  </div>

  <footer>
    <p>© 2026 Anime Kingdom | Powered by AniList API</p>
  </footer>

  <script>
    function playEpisode(file) {
      const player = document.getElementById('animePlayer');
      player.src = file;
      player.play();
    }

    async function fetchTrendingAnime() {
      const query = `
        query {
          Page(page:1, perPage:5) {
            media(type: ANIME, sort: TRENDING_DESC) {
              id
              title { romaji english }
              description(asHtml: false)
              coverImage { large }
              episodes
              genres
            }
          }
        }`;
      const response = await fetch("https://graphql.anilist.co", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ query })
      });
      const data = await response.json();
      const animeList = data.data.Page.media;

      document.getElementById("anime-container").innerHTML = animeList.map(anime => `
        <div class="anime-card">
          <img src="${anime.coverImage.large}" alt="${anime.title.romaji}">
          <h3>${anime.title.english || anime.title.romaji}</h3>
          <p>${anime.description ? anime.description.substring(0,100) + "..." : ""}</p>
          <p><b>Episodes:</b> ${anime.episodes || "N/A"}</p>
          <p><b>Genres:</b> ${anime.genres.join(", ")}</p>
        </div>
      `).join("");
    }

    fetchTrendingAnime();
  </script>
</body>
</html>
