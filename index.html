<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Final Power Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .anime-card:hover { transform: translateY(-10px); border: 2px solid #ffcc00; box-shadow: 0 0 30px rgba(255,204,0,0.4); }
        #video-overlay { display: none; background: rgba(0,0,0,1); }
        .ep-btn { transition: 0.3s; background: #1a1a1a; border: 1px solid #333; }
        .ep-btn:hover { background: #ffcc00; color: black; border-color: #ffcc00; }
        .active-ep { background: #ffcc00 !important; color: black !important; }
        iframe { border-radius: 12px; background: #000; }
    </style>
</head>
<body>

<!-- Global Player Overlay -->
<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col p-4 md:p-8 overflow-y-auto">
    <div class="max-w-5xl mx-auto w-full">
        <div class="flex justify-between items-center mb-6">
            <h2 id="playing-title" class="text-xl md:text-2xl font-bold text-[#ffcc00] truncate pr-4 uppercase tracking-tighter"></h2>
            <button onclick="stopVideo()" class="bg-red-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg">CLOSE X</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div class="aspect-video w-full">
                    <!-- වඩාත් ස්ථාවර Embed Player එකක් (HiAnime Server) -->
                    <iframe id="video-frame" src="" class="w-full h-full shadow-2xl" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                </div>
                <div class="mt-4 flex gap-4">
                   <p id="playing-ep" class="text-gray-400 font-bold text-sm">SELECT AN EPISODE</p>
                </div>
            </div>

            <!-- Episodes List -->
            <div class="bg-zinc-900 p-6 rounded-2xl h-[400px] lg:h-[500px] flex flex-col border border-white/10">
                <h3 class="font-bold mb-4 border-b border-white/10 pb-2"><i class="fas fa-list mr-2 text-[#ffcc00]"></i> EPISODES</h3>
                <div id="ep-list" class="grid grid-cols-4 lg:grid-cols-3 gap-2 overflow-y-auto pr-2">
                    <!-- Dynamic Episodes -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nav -->
<nav class="flex flex-col md:flex-row items-center justify-between px-8 py-6 bg-black sticky top-0 z-40 border-b border-white/5 gap-6">
    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
        <i class="fas fa-crown text-[#ffcc00] text-4xl"></i>
        <div class="leading-none">
            <span class="text-3xl font-black uppercase tracking-tighter block">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
            <span class="text-[9px] text-gray-500 font-bold tracking-[0.3em]">100% WORKING STREAM</span>
        </div>
    </div>
    <div class="relative w-full md:w-1/3">
        <input type="text" id="searchInput" oninput="searchKingdom()" placeholder="සොයන්න (Search)..." class="w-full bg-zinc-900 border border-white/10 rounded-full py-3 px-12 focus:border-[#ffcc00] outline-none text-sm text-white">
        <i class="fas fa-search absolute left-5 top-4 text-gray-500"></i>
    </div>
</nav>

<!-- Main Grid -->
<div class="p-8 max-w-7xl mx-auto">
    <h2 id="grid-title" class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest mb-10 text-[#ffcc00]">Trending Anime</h2>
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- AI Loading... -->
    </div>
</div>

<script>
    // AniList පාවිච්චි කරලා දත්ත ගන්නවා
    const ANILIST_URL = 'https://graphql.anilist.co';

    async function loadTrending() {
        const query = `query { Page(perPage: 30) { media(sort: TRENDING_DESC, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
        const res = await fetch(ANILIST_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
        const { data } = await res.json();
        render(data.Page.media);
    }

    async function searchKingdom() {
        const term = document.getElementById('searchInput').value;
        if (term.length > 2) {
            const query = `query ($search: String) { Page(perPage: 18) { media(search: $search, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
            const res = await fetch(ANILIST_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: { search: term } }) });
            const { data } = await res.json();
            render(data.Page.media);
        } else if (term.length === 0) { loadTrending(); }
    }

    function render(list) {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = list.map(anime => {
            const title = anime.title.english || anime.title.romaji;
            return `
            <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 group" onclick="openPlayer('${anime.idMal}', '${title}', ${anime.episodes || 12})">
                <img src="${anime.coverImage.large}" class="w-full h-64 object-cover group-hover:opacity-40 transition-opacity">
                <div class="p-3 text-center">
                    <h3 class="text-[10px] font-bold truncate uppercase tracking-tighter">${title}</h3>
                </div>
            </div>`;
        }).join('');
    }

    function openPlayer(id, title, epCount) {
        document.getElementById('playing-title').innerText = title;
        document.getElementById('video-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        const epList = document.getElementById('ep-list');
        epList.innerHTML = '';
        for(let i = 1; i <= (epCount || 1); i++) {
            epList.innerHTML += `<button onclick="playEp('${id}', ${i})" class="ep-btn py-3 rounded-lg font-bold text-xs">${i}</button>`;
        }
        playEp(id, 1); // Episode 1 auto-play
    }

    function playEp(id, ep) {
        // ලෝකයේ ස්ථාවරම Streaming Server එකක් (ID-Based)
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-ep').innerText = "NOW STREAMING: EPISODE " + ep;
        
        // අලුත්ම වැඩ කරන ලින්ක් එක (Emmy Player)
        frame.src = `https://vidsrc.cc{id}/${ep}`;
        
        // Button එක Active විදියට පෙන්වීමට
        const btns = document.querySelectorAll('.ep-btn');
        btns.forEach(btn => btn.classList.remove('active-ep'));
        event.target.classList.add('active-ep');
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
        document.body.style.overflow = 'auto';
    }

    window.onload = loadTrending;
</script>

</body>
</html>
