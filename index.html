<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Full Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #e50914; --bg: #050505; --card-bg: #111; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; overflow-x: hidden; }
        
        /* Nav & Search Bar */
        .top-nav { padding: 15px; background: #000; border-bottom: 1px solid #222; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: white; display: block; margin-bottom: 15px; }
        
        .search-area { display: flex; max-width: 500px; margin: 0 auto 10px; border-radius: 25px; overflow: hidden; border: 2px solid var(--accent); background: #000; }
        #searchInput { flex: 1; height: 40px; background: transparent; border: none; padding: 0 15px; color: white; outline: none; }
        .search-btn { background: var(--accent); border: none; color: white; padding: 0 15px; cursor: pointer; }

        /* Rows */
        .row-section { padding: 20px 0 0 15px; }
        .row-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .anime-row { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scrollbar-width: none; }
        .card { min-width: 140px; max-width: 140px; background: var(--card-bg); border-radius: 8px; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .card-title { font-size: 11px; padding: 8px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- PLAYER HUD & AUTO HIDE --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; }
        .player-box { flex: 1; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; transition: 0.4s; background: rgba(0,0,0,0.4); }
        .hud-hidden { opacity: 0; pointer-events: none; } /* බටන් හැංගෙන හැටි */

        .hud-top, .hud-bottom { padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; }
        .hud-bottom { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); flex-direction: column; gap: 10px; }

        .ui-btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .ui-sec { background: rgba(255,255,255,0.1); border: 1px solid #444; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">ANIME<span style="color:var(--accent)">KINGDOM</span></div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="ඇනිමේ නම සර්ච් කරන්න..." onkeypress="if(event.key==='Enter') searchAnime()">
            <button class="search-btn" onclick="searchAnime()"><i class="fas fa-search"></i></button>
        </div>
    </nav>

    <div id="home">
        <div class="row-section"><div class="row-title">TRENDING NOW</div><div id="trendingGrid" class="anime-row"></div></div>
        <div class="row-section"><div class="row-title">POPULAR</div><div id="popularGrid" class="anime-row"></div></div>
    </div>

    <!-- Modal Player -->
    <div id="playerModal" class="modal">
        <div class="player-box" id="pArea" onclick="showHUD()">
            <iframe id="vFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
            
            <div id="hud" class="hud-overlay">
                <div class="hud-top">
                    <button class="ui-btn" onclick="closePlayer()">◀ BACK</button>
                    <span id="pTitle" style="font-size: 13px;">Loading...</span>
                    <button class="ui-btn ui-sec" onclick="toggleFS()"><i class="fas fa-expand"></i> FULL</button>
                </div>
                <div class="hud-bottom">
                    <div style="display:flex; gap:10px; width:100%; justify-content:center;">
                        <button class="ui-btn ui-sec" onclick="changeEp(-1)">PREV</button>
                        <button class="ui-btn" onclick="alert('Intro Skipped')">SKIP INTRO</button>
                        <button class="ui-btn ui-sec" onclick="changeEp(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://graphql.anilist.co";
        let curA = ""; let curE = 1; let hT;

        window.onload = () => { fetchRow("TRENDING_DESC", "trendingGrid"); fetchRow("POPULARITY_DESC", "popularGrid"); };

        async function fetchRow(sort, id) {
            const q = `query{Page(perPage:12){media(sort:${sort},type:ANIME){title{english romaji}coverImage{large}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q})});
            const d = await r.json();
            document.getElementById(id).innerHTML = d.data.Page.media.map(a => {
                const t = a.title.english || a.title.romaji;
                return `<div class="card" onclick="play('${t.replace(/'/g,"")}')"><img src="${a.coverImage.large}"><div class="card-title">${t}</div></div>`;
            }).join('');
        }

        function play(t) {
            curA = t; curE = 1;
            document.getElementById('playerModal').style.display = 'flex';
            updateV(); showHUD();
        }

        function updateV() {
            document.getElementById('pTitle').innerText = `${curA} - Ep ${curE}`;
            document.getElementById('vFrame').src = `https://vidsrc.to{encodeURIComponent(curA).toLowerCase().replace(/\s+/g,'-')}/ep-${curE}`;
        }

        function showHUD() {
            const h = document.getElementById('hud');
            h.classList.remove('hud-hidden');
            clearTimeout(hT);
            hT = setTimeout(() => h.classList.add('hud-hidden'), 3000);
        }

        function toggleFS() {
            const p = document.getElementById('pArea');
            if(!document.fullscreenElement) {
                p.requestFullscreen();
                if(screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape");
            } else {
                document.exitFullscreen();
            }
        }

        function changeEp(s) { curE += s; if(curE<1) curE=1; updateV(); }
        function closePlayer() { document.getElementById('playerModal').style.display='none'; document.getElementById('vFrame').src=""; }
        
        function searchAnime() {
            const val = document.getElementById('searchInput').value;
            if(!val) return;
            document.getElementById('home').innerHTML = `<div class="row-section"><div class="row-title">Results: ${val}</div><div class="anime-row" id="sGrid"></div></div>`;
            fetchRow(`SEARCH, SEARCH:"${val}"`, "sGrid");
        }
    </script>
</body>
</html>
