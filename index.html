<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Kingdom | Anime & Manga</title>
  <script src="https://unpkg.com"></script>
  <style>
    :root { --red: #ff3e3e; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
    html, body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; overscroll-behavior-y: contain; }

    #hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-size: cover; background-position: center; transition: 0.8s; z-index: -2; filter: brightness(0.3); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(0deg, var(--bg) 20%, transparent 100%); z-index: -1; }

    header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
    .brand span { color: var(--red); }

    /* Search Box */
    .search-wrapper { padding: 0 25px; margin-bottom: 10px; }
    .search-container { display: flex; align-items: center; background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px; padding: 5px 15px; backdrop-filter: blur(15px); }
    .search-input { width: 100%; background: transparent !important; border: none !important; padding: 12px; color: white !important; outline: none !important; font-size: 16px; }

    /* Hero Info */
    .hero-info { padding: 10px 25px; min-height: 140px; display: flex; flex-direction: column; justify-content: flex-end; }
    .title { font-size: 32px; font-weight: 900; margin: 0; line-height: 1.1; }
    .btn-action { background: white; color: black; border: none; padding: 14px 40px; border-radius: 50px; font-weight: 900; font-size: 14px; cursor: pointer; margin-top: 15px; display: inline-flex; align-items: center; gap: 10px; }

    /* Categories */
    .category-section { margin-top: 25px; }
    .category-title { padding: 0 25px; font-size: 15px; font-weight: 800; text-transform: uppercase; color: #ccc; display: flex; align-items: center; gap: 8px; }
    .category-title::before { content: ''; width: 4px; height: 14px; background: var(--red); border-radius: 2px; }

    .menu-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 25px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .menu-scroll::-webkit-scrollbar { display: none; }
    .card { min-width: 100px; transition: 0.4s; cursor: pointer; text-align: center; }
    .card img { width: 100px; height: 140px; border-radius: 12px; object-fit: cover; border: 2px solid transparent; }
    .card.active img { border-color: white; transform: scale(1.05); }
    .card p { font-size: 10px; margin-top: 8px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* --- Modals (Selection & Player) --- */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 4000; display: none; backdrop-filter: blur(10px); }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-radius: 30px 30px 0 0; padding: 30px 25px; box-sizing: border-box; border-top: 3px solid var(--red); animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .option-card { display: flex; align-items: center; gap: 20px; padding: 20px; background: #1a1a1a; margin-bottom: 15px; border-radius: 18px; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
    .option-card:active { transform: scale(0.97); background: #252525; }
    .option-icon { width: 50px; height: 50px; background: var(--red); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .option-info b { font-size: 18px; display: block; margin-bottom: 4px; }
    .option-info span { font-size: 12px; color: #888; }

  </style>
</head>
<body>

  <div id="hero-bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="brand">ANIME<span>KINGDOM</span></div>
    <div id="clock" style="font-size: 13px; opacity: 0.7;"></div>
  </header>

  <div class="search-wrapper">
    <div class="search-container">
      <i data-lucide="search" size="18" color="#ff3e3e"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search Anime or Manga..." oninput="handleSearch()">
    </div>
  </div>

  <div class="hero-info">
    <div id="h-meta" style="font-size: 10px; color: var(--red); font-weight: 800; margin-bottom: 5px;">TRENDING</div>
    <h1 class="title" id="h-title">Select Title</h1>
    <button class="btn-action" onclick="openChoiceModal()">
      <i data-lucide="plus-circle" fill="black" size="18"></i> START EXPLORING
    </button>
  </div>

  <!-- Categories -->
  <div class="category-section"><div class="category-title">Trending Now</div><div class="menu-scroll" id="trending-list"></div></div>
  <div class="category-section"><div class="category-title">Popular Series</div><div class="menu-scroll" id="popular-list"></div></div>
  <div class="category-section" style="margin-bottom: 50px;"><div class="category-title">Top Rated</div><div class="menu-scroll" id="top-list"></div></div>

  <!-- Step 1: Choice Modal (Watch or Read) -->
  <div id="choice-modal" class="modal-overlay" onclick="closeModals()">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
      <h3 style="margin-top:0; margin-bottom:25px; text-align:center;">WHAT DO YOU WANT TO DO?</h3>
      
      <div class="option-card" onclick="openPlayerMenu()">
        <div class="option-icon"><i data-lucide="play" fill="white"></i></div>
        <div class="option-info"><b>WATCH ANIME</b><span>Stream episodes with external players</span></div>
      </div>

      <div class="option-card" onclick="readManga()">
        <div class="option-icon" style="background:#2ecc71;"><i data-lucide="book-open" fill="white"></i></div>
        <div class="option-info"><b>READ MANGA / MANHWA</b><span>Read full chapters online</span></div>
      </div>
    </div>
  </div>

  <!-- Step 2: Player Selector Modal -->
  <div id="player-modal" class="modal-overlay" onclick="closeModals()">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
      <h3 style="margin-top:0; margin-bottom:20px; color:var(--red);">SELECT PLAYER</h3>
      <div class="option-card" onclick="launchApp('splayer')"><i data-lucide="zap" color="#ff3e3e"></i><b>SPlayer</b></div>
      <div class="option-card" onclick="launchApp('vlc')"><i data-lucide="cone" color="#ff3e3e"></i><b>VLC Player</b></div>
      <div class="option-card" onclick="launchApp('mx')"><i data-lucide="play-square" color="#ff3e3e"></i><b>MX Player</b></div>
    </div>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let cur = null;

    async function loadAll() {
      fetchData(`{Page(perPage:12){media(sort:TRENDING_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "trending-list");
      fetchData(`{Page(perPage:12){media(sort:POPULARITY_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "popular-list");
      fetchData(`{Page(perPage:12){media(sort:SCORE_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "top-list");
    }

    async function fetchData(q, id, vars={}) {
      const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:vars})});
      const data = await res.json();
      const list = data.data.Page.media;
      document.getElementById(id).innerHTML = list.map((a, i) => `
        <div class="card" onclick="sel(${JSON.stringify(a).replace(/"/g, '&quot;')}, this)">
          <img src="${a.coverImage.large}">
          <p>${(a.title.english || a.title.romaji).substring(0,12)}</p>
        </div>`).join('');
      if(id === "trending-list" && list.length > 0) sel(list);
    }

    function sel(a, el) {
      cur = a;
      document.getElementById('hero-bg').style.backgroundImage = `url('${a.bannerImage || a.coverImage.extraLarge}')`;
      document.getElementById('h-title').innerText = a.title.english || a.title.romaji;
      if(el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }

    // --- Modal Logic ---
    function openChoiceModal() { if(cur) document.getElementById('choice-modal').style.display='block'; }
    function closeModals() { 
      document.getElementById('choice-modal').style.display='none'; 
      document.getElementById('player-modal').style.display='none'; 
    }

    function openPlayerMenu() {
      document.getElementById('choice-modal').style.display='none';
      document.getElementById('player-modal').style.display='block';
    }

    function readManga() {
      // Anime එකේ නම පාවිච්චි කරලා Mangadex වැනි සයිට් එකකට යොමු කරනවා
      const name = cur.title.english || cur.title.romaji;
      const searchUrl = `https://mangadex.org{encodeURIComponent(name)}`;
      window.open(searchUrl, '_blank');
      closeModals();
    }

    function launchApp(type) {
      const stream = `https://www.2embed.cc{cur.id}/1`;
      const title = cur.title.english || cur.title.romaji;
      let url = "";
      if(type === 'splayer') url = `intent:${stream}#Intent;package=com.sentis.splayer;S.title=${encodeURIComponent(title)};end`;
      else if(type === 'vlc') url = `intent:${stream}#Intent;package=org.videolan.vlc;S.title=${encodeURIComponent(title)};end`;
      else if(type === 'mx') url = `intent:${stream}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(title)};end`;
      
      window.location.href = url;
      closeModals();
    }

    function handleSearch() {
      const v = document.getElementById('searchInput').value;
      if(v.length < 2) return;
      fetchData(`query($s:String){Page(perPage:12){media(search:$s,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, "trending-list", {s:v});
    }

    loadAll();
    lucide.createIcons();
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
  </script>
</body>
</html>
