<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: translateY(-10px); border: 2px solid #ffcc00; }
        #video-overlay { display: none; background: rgba(0,0,0,1); }
        .ep-btn { background: #1a1a1a; border: 1px solid #333; transition: 0.3s; }
        .ep-btn:hover { background: #ffcc00; color: black; }
        .active-ep { background: #ffcc00 !important; color: black !important; }
    </style>
</head>
<body>

<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col p-4 md:p-8 overflow-y-auto">
    <div class="max-w-5xl mx-auto w-full">
        <div class="flex justify-between items-center mb-6">
            <h2 id="playing-title" class="text-xl font-bold text-[#ffcc00] uppercase pr-4"></h2>
            <button onclick="stopVideo()" class="bg-red-600 px-6 py-2 rounded-full font-bold">CLOSE X</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div class="aspect-video w-full rounded-xl overflow-hidden border-2 border-[#ffcc00]">
                    <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                </div>
                
                <div class="mt-6 p-6 bg-zinc-900 rounded-2xl border border-white/10 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h3 class="font-bold text-lg">බාගත කිරීම් (Downloads)</h3>
                        <p id="ep-display" class="text-xs text-[#ffcc00]">තෝරාගත් එපිසෝඩය: 1</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="downloadContent('video')" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-bold transition flex items-center"><i class="fas fa-download mr-2"></i> VIDEO</button>
                        <button onclick="downloadContent('sub')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-bold transition flex items-center"><i class="fas fa-file-alt mr-2"></i> SINHALA SUB</button>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900 p-6 rounded-2xl h-[400px] lg:h-[500px] border border-white/10 flex flex-col">
                <h3 class="font-bold mb-4 border-b border-white/10 pb-2 uppercase text-sm tracking-widest">Episodes</h3>
                <div id="ep-list" class="grid grid-cols-4 lg:grid-cols-3 gap-2 overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>
</div>

<nav class="flex items-center justify-between px-8 py-6 bg-black sticky top-0 z-40 border-b border-white/5">
    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <span class="text-2xl font-black uppercase">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
    </div>
    <input type="text" id="searchInput" oninput="searchKingdom()" placeholder="සොයන්න (Search)..." class="bg-zinc-900 border border-white/10 rounded-full py-2 px-10 focus:border-[#ffcc00] outline-none text-sm w-1/3">
</nav>

<div class="p-8 max-w-7xl mx-auto">
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
</div>

<script>
    const ANILIST_URL = 'https://graphql.anilist.co';
    let currentId = '';
    let currentEp = 1;
    let currentTitle = '';

    async function loadTrending() {
        const query = `query { Page(perPage: 30) { media(sort: TRENDING_DESC, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
        const res = await fetch(ANILIST_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
        const { data } = await res.json();
        render(data.Page.media);
    }

    function render(list) {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = list.map(anime => {
            const title = anime.title.english || anime.title.romaji;
            return `<div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer" onclick="openPlayer('${anime.idMal}', '${title.replace(/'/g, "")}', ${anime.episodes || 12})">
                <img src="${anime.coverImage.large}" class="w-full h-64 object-cover">
                <h3 class="p-3 text-[10px] font-bold truncate text-center">${title}</h3>
            </div>`;
        }).join('');
    }

    function openPlayer(id, title, epCount) {
        currentId = id; currentTitle = title;
        document.getElementById('playing-title').innerText = title;
        document.getElementById('video-overlay').style.display = 'block';
        const epList = document.getElementById('ep-list'); epList.innerHTML = '';
        for(let i = 1; i <= (epCount || 1); i++) {
            epList.innerHTML += `<button onclick="playEp(${i})" class="ep-btn py-3 rounded-lg font-bold text-xs">${i}</button>`;
        }
        playEp(1);
    }

    function playEp(ep) {
        currentEp = ep;
        document.getElementById('ep-display').innerText = "තෝරාගත් එපිසෝඩය: " + ep;
        document.getElementById('video-frame').src = `https://vidsrc.cc{currentId}/${ep}`;
        const btns = document.querySelectorAll('.ep-btn');
        btns.forEach(b => b.classList.remove('active-ep'));
        event.target.classList.add('active-ep');
    }

    function downloadContent(type) {
        if(type === 'video') {
            // වඩාත් සුදුසු සෘජු බාගත කිරීම් සෙවුමක්
            window.open(`https://www.google.com{encodeURIComponent(currentTitle)}+episode+${currentEp}+english+sub+download`, '_blank');
        } else {
            // සිංහල උපසිරසි සෙවීම සඳහා
            window.open(`https://www.google.com{encodeURIComponent(currentTitle)}+sinhala+subtitles+download`, '_blank');
        }
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
    }

    window.onload = loadTrending;
</script>
</body>
</html>
