<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | සිංහල උපසිරසි සමඟ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: translateY(-8px); border: 2px solid #ffcc00; }
        #video-overlay { display: none; background: rgba(0,0,0,0.98); }
        .sub-badge { position: absolute; top: 10px; left: 10px; background: #ffcc00; color: black; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; z-index: 10; }
    </style>
</head>
<body>

<!-- Player Overlay -->
<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl relative">
        <div class="flex justify-between items-center mb-4">
            <h2 id="playing-title" class="text-[#ffcc00] font-bold truncate pr-4"></h2>
            <button onclick="stopVideo()" class="bg-red-600 px-4 py-1 rounded font-bold text-white">වැසීමට X</button>
        </div>
        <div class="aspect-video bg-black rounded-xl overflow-hidden border-2 border-[#ffcc00] shadow-2xl">
            <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="mt-4 flex gap-4">
            <button onclick="switchServer('si')" class="bg-white text-black px-4 py-2 rounded-lg font-bold hover:bg-[#ffcc00] transition">සිංහල උපසිරසි (SI)</button>
            <button onclick="switchServer('en')" class="border border-white text-white px-4 py-2 rounded-lg font-bold hover:bg-white hover:text-black transition">English Sub (EN)</button>
        </div>
    </div>
</div>

<!-- Navigation -->
<nav class="flex items-center justify-between px-6 py-4 bg-black/95 sticky top-0 z-50 border-b border-white/10 shadow-2xl">
    <div class="flex items-center gap-3">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <div class="leading-tight">
            <span class="text-2xl font-black uppercase block">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
            <span class="text-[10px] text-gray-400 tracking-[0.2em] font-bold">SINHALA SUBS PORTAL</span>
        </div>
    </div>
    <div class="relative w-1/3">
        <input type="text" id="searchInput" oninput="searchKingdom()" placeholder="Anime සොයන්න..." class="w-full bg-zinc-900 border border-white/10 rounded-full py-2 px-10 focus:border-[#ffcc00] outline-none text-sm">
        <i class="fas fa-search absolute left-4 top-3 text-gray-500"></i>
    </div>
</nav>

<!-- Content -->
<div class="p-8 max-w-7xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest">ජනප්‍රිය ඇනිමේ (Trending)</h2>
    </div>
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <p class="text-gray-500 col-span-full text-center py-20">Loading Kingdom's Content...</p>
    </div>
</div>

<script>
    const API_URL = "https://api.jikan.moe";
    let currentAnimeId = "";
    let currentAnimeTitle = "";

    async function loadData() {
        try {
            const res = await fetch(`${API_URL}/top/anime`);
            const data = await res.json();
            renderList(data.data);
        } catch (e) {
            console.error("Data Load Error");
        }
    }

    function renderList(list) {
        const container = document.getElementById('grid-container');
        container.innerHTML = list.map(a => `
            <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 relative group" onclick="openPlayer('${a.mal_id}', '${a.title}')">
                <div class="sub-badge">SI-SUB</div>
                <img src="${a.images.jpg.large_image_url}" class="w-full h-64 object-cover group-hover:opacity-40 transition-opacity">
                <div class="p-3">
                    <h3 class="text-sm font-bold truncate group-hover:text-[#ffcc00] transition-colors">${a.title}</h3>
                    <p class="text-[10px] text-gray-500 mt-1 uppercase">Episodes: ${a.episodes || '??'}</p>
                </div>
            </div>
        `).join('');
    }

    async function searchKingdom() {
        const q = document.getElementById('searchInput').value;
        if(q.length > 2) {
            const res = await fetch(`${API_URL}/anime?q=${q}`);
            const data = await res.json();
            renderList(data.data);
        }
    }

    function openPlayer(id, title) {
        currentAnimeId = id;
        currentAnimeTitle = title;
        document.getElementById('playing-title').innerText = "නරඹන්නේ: " + title;
        switchServer('si'); // Default සිංහල උපසිරසි
        document.getElementById('video-overlay').style.display = 'flex';
    }

    function switchServer(lang) {
        const frame = document.getElementById('video-frame');
        if(lang === 'si') {
            // සිංහල උපසිරසි ඇති වීඩියෝ සෙවීමට (AI logic එකක් ලෙස පාවිච්චි වේ)
            frame.src = `https://www.youtube.com{currentAnimeTitle}+sinhala+sub`;
        } else {
            frame.src = `https://www.youtube.com{currentAnimeTitle}+episode+1+english+sub`;
        }
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
    }

    window.onload = loadData;
</script>

</body>
</html>
