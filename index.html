<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime kingdom - ස්වයංක්‍රීය අඩවිය</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        header { text-align: center; padding: 50px 0; background: linear-gradient(45deg, #1e293b, #334155); }
        #anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card h3 { font-size: 14px; padding: 10px; text-align: center; margin: 0; }
        #search-box { width: 100%; max-width: 500px; padding: 12px; border-radius: 25px; border: none; outline: none; display: block; margin: -25px auto 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>
    <h1>AI ANIME EXPLORER</h1>
    <p>ලොව පුරා ජනප්‍රිය ඇනිමේ දැන් එකම තැනකින්</p>
</header>

<input type="text" id="search-box" placeholder="Anime නමක් සොයන්න..." oninput="searchAnime()">

<div class="container">
    <div id="anime-grid">
        <!-- මෙතනට API එක හරහා දත්ත ස්වයංක්‍රීයව පැමිණේ -->
    </div>
</div>

<script>
    const apiURL = "https://api.jikan.moe/v4/top/anime";

    // පිටුව Load වන විට Top Anime ගෙන්වා ගැනීම
    async function fetchTopAnime() {
        const response = await fetch(apiURL);
        const data = await response.json();
        displayAnime(data.data);
    }

    // දත්ත තිරය මත පෙන්වීම
    function displayAnime(animeList) {
        const grid = document.getElementById('anime-grid');
        grid.innerHTML = "";
        animeList.forEach(anime => {
            const card = `
                <div class="card" onclick="window.open('${anime.url}', '_blank')">
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                    <h3>${anime.title}</h3>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    // Search කිරීමේදී "හිතලා" ක්‍රියා කරන ආකාරය
    async function searchAnime() {
        const query = document.getElementById('search-box').value;
        if (query.length > 2) {
            const response = await fetch(`https://api.jikan.moe{query}`);
            const data = await response.json();
            displayAnime(data.data);
        } else if (query.length === 0) {
            fetchTopAnime();
        }
    }

    fetchTopAnime();
</script>

</body>
</html>
