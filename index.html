<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Kingdom</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
    }
    header {
      background-color: #1f1f1f;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      color: #9b59b6;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
    }
    .hero {
      background: url('banner.jpg') no-repeat center center/cover;
      height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }
    .hero h2 {
      font-size: 40px;
      margin: 0;
    }
    .hero button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #9b59b6;
      border: none;
      color: #fff;
      cursor: pointer;
    }
    .section {
      padding: 20px 30px;
    }
    .anime-list {
      display: flex;
      overflow-x: auto;
    }
    .anime-card {
      background: #1f1f1f;
      margin-right: 15px;
      width: 200px;
      border-radius: 5px;
      overflow: hidden;
    }
    .anime-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    .anime-card h3 {
      padding: 10px;
      font-size: 16px;
    }
    footer {
      background: #1f1f1f;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Anime Kingdom</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Categories</a>
      <a href="#">Popular</a>
      <a href="#">Latest</a>
      <a href="#">My List</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Featured Anime: Demon Slayer</h2>
    <p>Follow Tanjiro on his journey to save his sister...</p>
    <button>▶ Play Now</button>
  </section>

  <section class="section">
    <h2>Trending Anime</h2>
    <div class="anime-list">
      <div class="anime-card">
        <img src="naruto.jpg" alt="Naruto">
        <h3>Naruto</h3>
      </div>
      <div class="anime-card">
        <img src="onepiece.jpg" alt="One Piece">
        <h3>One Piece</h3>
      </div>
      <div class="anime-card">
        <img src="attackontitan.jpg" alt="Attack on Titan">
        <h3>Attack on Titan</h3>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Anime Kingdom | All Rights Reserved</p>
  </footer>
</body>
</html>
