<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Hub | සිංහලෙන්</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: white; margin: 0; }
        header { background-color: #1f2833; padding: 20px; text-align: center; border-bottom: 2px solid #45a29e; }
        .search-container { margin: 20px auto; text-align: center; }
        input[type="text"] { padding: 10px; width: 60%; border-radius: 5px; border: none; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .anime-card { background: #1f2833; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .anime-card:hover { transform: scale(1.05); border: 1px solid #66fcf1; }
        .anime-card img { width: 100%; height: 250px; object-fit: cover; }
        .anime-info { padding: 10px; text-align: center; }
        button { background: #45a29e; border: none; padding: 10px; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>ANIMAX SRI LANKA</h1>
    <p>ඔබේ ප්‍රියතම Anime දැන් සිංහලෙන්</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Anime නම මෙතන ලියන්න (AI Search)..." onkeyup="aiSearch()">
</div>

<div class="anime-grid" id="animeList">
    <!-- Anime Card 1 -->
    <div class="anime-card">
        <img src="https://via.placeholder.com" alt="Naruto">
        <div class="anime-info">
            <h3>Naruto Shippuden</h3>
            <button>නරඹන්න</button>
        </div>
    </div>
    <!-- Anime Card 2 -->
    <div class="anime-card">
        <img src="https://via.placeholder.com" alt="One Piece">
        <div class="anime-info">
            <h3>One Piece</h3>
            <button>නරඹන්න</button>
        </div>
    </div>
    <!-- තව Anime මෙතනට එක් කරන්න පුළුවන් -->
</div>

<script>
    // මෙය සරල AI Search එකක් ලෙස ක්‍රියා කරයි
    function aiSearch() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('anime-card');
        
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
            if (title.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
