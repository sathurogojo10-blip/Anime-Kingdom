<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | AniList Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: translateY(-8px); border: 2px solid #ffcc00; box-shadow: 0 0 20px rgba(255,204,0,0.2); }
        #video-overlay { display: none; background: rgba(0,0,0,0.98); }
        .loading-shimmer { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<!-- Video Player Overlay -->
<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl relative">
        <div class="flex justify-between items-center mb-4">
            <h2 id="playing-title" class="text-[#ffcc00] font-bold pr-4">නරඹමින්...</h2>
            <button onclick="stopVideo()" class="bg-red-600 px-4 py-1 rounded font-bold">CLOSE X</button>
        </div>
        <div class="aspect-video bg-black rounded-xl overflow-hidden border-2 border-[#ffcc00]">
            <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- Navigation -->
<nav class="flex items-center justify-between px-6 py-4 bg-black/95 sticky top-0 z-50 border-b border-white/10">
    <div class="flex items-center gap-3">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <div>
            <span class="text-2xl font-black uppercase block tracking-tighter">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Sinhala Subs Portal</span>
        </div>
    </div>
</nav>

<!-- Main Grid -->
<div class="p-8 max-w-7xl mx-auto">
    <h2 class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest mb-8 text-[#ffcc00]">ජනප්‍රිය ඇනිමේ (TRENDING)</h2>
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- Loading Placeholder -->
        <div class="loading-shimmer h-64 rounded-xl"></div>
        <div class="loading-shimmer h-64 rounded-xl"></div>
        <div class="loading-shimmer h-64 rounded-xl"></div>
    </div>
</div>

<script>
    // AniList GraphQL API එක භාවිතා කිරීම
    const ANILIST_URL = 'https://graphql.anilist.co';

    async function loadAniList() {
        const query = `
        query {
          Page(page: 1, perPage: 18) {
            media(sort: TRENDING_DESC, type: ANIME) {
              id
              title { english romaji }
              coverImage { large }
            }
          }
        }`;

        try {
            const res = await fetch(ANILIST_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const { data } = await res.json();
            render(data.Page.media);
        } catch (err) {
            document.getElementById('grid-container').innerHTML = "<p class='col-span-full text-center text-red-500'>දත්ත ලබාගැනීමට නොහැකි විය.</p>";
        }
    }

    function render(list) {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = list.map(anime => {
            const title = anime.title.english || anime.title.romaji;
            return `
            <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 relative group" onclick="play('${title}')">
                <img src="${anime.coverImage.large}" class="w-full h-64 object-cover">
                <div class="p-3 text-center">
                    <h3 class="text-xs font-bold truncate group-hover:text-[#ffcc00]">${title}</h3>
                </div>
            </div>`;
        }).join('');
    }

    function play(title) {
        document.getElementById('playing-title').innerText = "නරඹන්නේ: " + title;
        document.getElementById('video-frame').src = `https://www.youtube.com{title}+sinhala+sub`;
        document.getElementById('video-overlay').style.display = 'flex';
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
    }

    window.onload = loadAniList;
</script>

</body>
</html>
