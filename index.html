<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Watch Anime Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        :root { --king-gold: #ffcc00; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-gradient { background: linear-gradient(0deg, var(--dark-bg) 10%, transparent 100%); }
        .anime-card { transition: all 0.4s ease; border: 1px solid #1a1a1a; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--king-gold); box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        #video-modal { display: none; background: rgba(0,0,0,0.98); }
    </style>
</head>
<body>

<!-- Video Modal (The Player) -->
<div id="video-modal" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-5xl relative">
        <button onclick="closeStream()" class="absolute -top-12 right-0 text-white text-xl bg-red-600 px-4 py-1 rounded">CLOSE <i class="fas fa-times"></i></button>
        <div class="aspect-video w-full bg-black rounded-lg overflow-hidden shadow-2xl">
            <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
        <h2 id="playing-title" class="mt-4 text-2xl font-bold text-[#ffcc00]"></h2>
    </div>
</div>

<!-- Navbar -->
<nav class="flex items-center justify-between px-8 py-4 bg-black/80 sticky top-0 z-50 border-b border-white/10">
    <div class="flex items-center gap-2">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <span class="text-2xl font-black tracking-tighter uppercase">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
    </div>
    <div class="relative w-1/3">
        <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
        <input type="text" id="searchBar" onkeyup="searchAnime()" placeholder="සොයන්න (Search Anime...)" class="w-full bg-[#111] py-2 pl-12 pr-4 rounded-full border border-white/10 focus:border-[#ffcc00] outline-none">
    </div>
</nav>

<!-- Hero Section -->
<div class="relative h-[500px] w-full bg-cover bg-center mb-10" style="background-image: url('https://wallpapercave.com');">
    <div class="absolute inset-0 hero-gradient"></div>
    <div class="absolute bottom-10 left-10 max-w-2xl">
        <span class="bg-[#ffcc00] text-black px-3 py-1 rounded-sm font-bold text-sm">TRENDING KINGDOM</span>
        <h1 class="text-6xl font-black mt-2">Solo Leveling</h1>
        <p class="text-gray-300 mt-4 text-lg">ලොව වටා ජනප්‍රියම Anime දැන් සිංහල උපසිරසි සමඟින් නරඹන්න.</p>
        <button class="mt-6 bg-[#ffcc00] text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition"><i class="fas fa-play mr-2"></i> දැන් නරඹන්න</button>
    </div>
</div>

<!-- Content Grid -->
<div class="px-8 pb-20">
    <h2 class="text-2xl font-bold mb-8 border-l-4 border-[#ffcc00] pl-4">නවතම නිකුත් කිරීම් (Latest Episodes)</h2>
    <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- AI Automated Data Loads Here -->
    </div>
</div>

<script>
    const API_URL = "https://api.consumet.org";

    // දත්ත ස්වයංක්‍රීයව ඇද ගැනීම
    async function loadKingdomAnime() {
        try {
            const res = await fetch(`${API_URL}/top-airing`);
            const data = await res.json();
            displayAnime(data.results);
        } catch (e) { console.error("Error loading anime"); }
    }

    function displayAnime(list) {
        const grid = document.getElementById('anime-grid');
        grid.innerHTML = list.map(anime => `
            <div class="anime-card bg-[#111] rounded-xl overflow-hidden cursor-pointer relative group" onclick="startStream('${anime.id}', '${anime.title}')">
                <img src="${anime.image}" class="w-full h-72 object-cover">
                <div class="p-3">
                    <h3 class="text-sm font-bold truncate group-hover:text-[#ffcc00]">${anime.title}</h3>
                    <p class="text-xs text-gray-500 mt-1">EP: ${anime.episodeNumber || '1'}</p>
                </div>
                <div class="absolute top-2 right-2 bg-black/80 p-1 px-2 rounded text-[10px] font-bold text-[#ffcc00]">HD</div>
            </div>
        `).join('');
    }

    async function searchAnime() {
        const q = document.getElementById('searchBar').value;
        if(q.length > 2) {
            const res = await fetch(`${API_URL}/${q}`);
            const data = await res.json();
            displayAnime(data.results);
        }
    }

    // Video Player එක "හිතලා වැඩ කරන" හැටි
    function startStream(id, title) {
        const modal = document.getElementById('video-modal');
        const player = document.getElementById('main-player');
        document.getElementById('playing-title').innerText = "Playing: " + title;
        
        // මෙය සැබෑ Streaming ලින්ක් එක ලබාදෙන API එකයි
        player.src = `https://www.ranker.com{id}`; 
        modal.style.display = "flex";
    }

    function closeStream() {
        document.getElementById('video-modal').style.display = "none";
        document.getElementById('main-player').src = "";
    }

    window.onload = loadKingdomAnime;
</script>

</body>
</html>
