<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Kingdom | PS5 Pro</title>
  <!-- Lucide Icons පාවිච්චි කරමු (ගොඩක් Advance අයිකන් සඳහා) -->
  <script src="https://unpkg.com"></script>
  <style>
    :root { --primary-red: #ff3e3e; --bg-dark: #080808; --glass: rgba(255, 255, 255, 0.08); }
    
    body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }

    .hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-size: cover; background-position: center; 
      transition: background 0.8s ease; z-index: -2; filter: brightness(0.3);
    }
    
    .hero-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, transparent 0%, var(--bg-dark) 95%);
      z-index: -1;
    }

    /* --- Advanced Search Bar UI --- */
    .search-wrapper {
      padding: 10px 20px;
      position: sticky; top: 50px; z-index: 100;
    }
    
    .search-container {
      position: relative;
      display: flex; align-items: center;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 5px 15px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    /* සර්ච් බාර් එක උඩට ක්ලික් කළාම වෙනස් වන ආකාරය */
    .search-container:focus-within {
      border-color: var(--primary-red);
      box-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
      transform: scale(1.02);
      background: rgba(255, 255, 255, 0.12);
    }

    .search-input {
      width: 100%; background: none; border: none;
      padding: 12px 10px; color: white; font-size: 16px;
      outline: none; font-weight: 500;
    }

    .search-input::placeholder { color: rgba(255, 255, 255, 0.4); font-weight: 400; }

    /* Search Icon & Animation */
    .search-icon-box {
      display: flex; align-items: center; justify-content: center;
      color: var(--primary-red); transition: 0.3s;
    }

    /* සර්ච් කරන විට කැරකෙන ඇනිමේෂන් එක */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .loading-spinner { animation: spin 1s linear infinite; color: white !important; }

    /* --- Menu & Content --- */
    .menu-scroll { display: flex; overflow-x: auto; padding: 20px; gap: 12px; scrollbar-width: none; }
    .menu-scroll::-webkit-scrollbar { display: none; }
    
    .anime-item { min-width: 85px; text-align: center; cursor: pointer; transition: 0.3s; }
    .anime-item img { width: 80px; height: 110px; border-radius: 10px; object-fit: cover; border: 2px solid transparent; }
    .anime-item.active img { border-color: white; transform: scale(1.05); }
    .anime-item p { font-size: 10px; margin-top: 5px; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .main-info { padding: 0 25px 100px 25px; }
    .title { font-size: 34px; font-weight: 800; margin: 5px 0; }
    .genres { color: var(--primary-red); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px;}
    .desc { color: #ccc; font-size: 14px; line-height: 1.5; margin-bottom: 20px; max-height: 100px; overflow-y: auto; }
    
    .btn-play {
      background: white; color: black; border: none; padding: 14px 40px;
      border-radius: 50px; font-weight: bold; font-size: 16px;
      display: inline-flex; align-items: center; gap: 10px;
    }
  </style>
</head>
<body>

  <div id="hero-bg" class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
    <div style="font-weight: 900; font-size: 18px;">ANIME<span style="color:var(--primary-red)">KINGDOM</span></div>
    <div id="clock" style="font-size: 14px; opacity: 0.8;"></div>
  </header>

  <!-- Advance Search Bar Wrapper -->
  <div class="search-wrapper">
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Search for anime..." oninput="handleSearch()">
      <div class="search-icon-box" id="searchIcon">
        <i data-lucide="search" size="20"></i>
      </div>
    </div>
  </div>

  <div class="menu-scroll" id="anime-list"></div>

  <div class="main-info">
    <div class="genres" id="genre-box">DRAMA • FANTASY</div>
    <h1 class="title" id="main-title">Select Anime</h1>
    <p class="desc" id="main-desc">The most immersive anime experience in your pocket.</p>
    <button class="btn-play">
      <i data-lucide="play" fill="black"></i> WATCH NOW
    </button>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let debounceTimer;

    // Search Handle with Advance Loader Icon
    async function handleSearch() {
      const term = document.getElementById('searchInput').value;
      const iconBox = document.getElementById('searchIcon');
      
      if (term.length < 2) { loadTrending(); return; }

      // Change icon to Loading Spinner
      iconBox.innerHTML = '<i data-lucide="loader-2" class="loading-spinner"></i>';
      lucide.createIcons();

      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(async () => {
        const query = `query ($s: String) { Page(perPage: 12) { media(search: $s, type: ANIME) { 
          title { english romaji } coverImage { extraLarge large } bannerImage description genres 
        }}}`;
        
        try {
          const res = await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query, variables: { s: term } })
          });
          const data = await res.json();
          renderList(data.data.Page.media);
          
          // Change back to Search icon
          iconBox.innerHTML = '<i data-lucide="search"></i>';
          lucide.createIcons();
        } catch(e) { console.error(e); }
      }, 600);
    }

    async function loadTrending() {
      const query = `{ Page(perPage: 12) { media(sort: TRENDING_DESC, type: ANIME) { 
        title { english romaji } coverImage { extraLarge large } bannerImage description genres 
      }}}`;
      const res = await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ query }) });
      const data = await res.json();
      renderList(data.data.Page.media);
    }

    function renderList(list) {
      const container = document.getElementById('anime-list');
      container.innerHTML = list.map((anime, i) => `
        <div class="anime-item ${i === 0 ? 'active' : ''}" onclick="updateUI(${JSON.stringify(anime).replace(/"/g, '&quot;')}, this)">
          <img src="${anime.coverImage.large}">
          <p>${anime.title.english || anime.title.romaji}</p>
        </div>
      `).join('');
      if(list[0]) updateUI(list[0]);
    }

    function updateUI(anime, el) {
      const bg = anime.bannerImage || anime.coverImage.extraLarge;
      document.getElementById('hero-bg').style.backgroundImage = `url('${bg}')`;
      document.getElementById('main-title').innerText = anime.title.english || anime.title.romaji;
      document.getElementById('main-desc').innerHTML = anime.description;
      document.getElementById('genre-box').innerText = anime.genres.join(" • ");

      if(el) {
        document.querySelectorAll('.anime-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }

    // Initialize Icons and Clock
    lucide.createIcons();
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    loadTrending();
  </script>
</body>
</html>
