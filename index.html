<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Kingdom | Final Edition</title>
  <script src="https://unpkg.com"></script>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <style>
    :root { --red: #ff3e3e; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    #hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-size: cover; background-position: center; transition: 0.8s; z-index: -2; filter: brightness(0.2); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(0deg, var(--bg) 10%, transparent 100%); z-index: -1; }
    header { padding: 25px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
    .brand span { color: var(--red); }
    .search-wrapper { padding: 0 25px; margin-bottom: 20px; }
    .search-container { display: flex; align-items: center; background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px; padding: 5px 15px; }
    .search-input { width: 100%; background: transparent; border: none; padding: 12px; color: white; outline: none; font-size: 16px; }
    .section-title { padding: 20px 25px 0; font-size: 13px; font-weight: 800; color: #777; text-transform: uppercase; letter-spacing: 1px; }
    .menu-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 25px; scrollbar-width: none; }
    .card { min-width: 110px; cursor: pointer; transition: 0.3s; position: relative; }
    .card img { width: 110px; height: 160px; border-radius: 12px; object-fit: cover; border: 2px solid transparent; }
    .card:hover img { border-color: var(--red); transform: translateY(-5px); }
    .card p { font-size: 11px; margin-top: 8px; text-align: center; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; backdrop-filter: blur(15px); overflow-y: auto; }
    .modal-content { padding: 40px 20px; max-width: 700px; margin: 0 auto; }
    .season-tabs { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
    .tab { background: #111; padding: 10px 20px; border-radius: 10px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid #222; }
    .tab.active { background: var(--red); border-color: var(--red); font-weight: bold; }
    .ep-item { background: #0f0f0f; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; margin-bottom: 10px; }
    .sub-btn { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
    .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; display: none; align-items: center; justify-content: center; }
    .admin-box { background: #0a0a0a; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; border: 1px solid var(--red); }
    .admin-box input { width: 100%; padding: 14px; margin: 10px 0; background: #111; border: 1px solid #222; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
    .upload-btn { background: var(--red); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 15px; }
  </style>
</head>
<body>

  <div id="hero-bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="brand">ANIME<span>KINGDOM</span></div>
    <div style="font-size: 11px; color: #555;">2026 PRO</div>
  </header>

  <div class="search-wrapper">
    <div class="search-container">
      <i data-lucide="search" size="18" color="#ff3e3e"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search Anime or Code..." oninput="handleLogic(this.value)">
    </div>
  </div>

  <div id="search-section" style="display: none;">
    <div class="section-title">Search Results</div>
    <div id="search-grid" class="menu-scroll" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));"></div>
  </div>

  <div id="main-content">
    <div class="section-title">Trending Now</div>
    <div class="menu-scroll" id="trend-list"></div>
    <div class="section-title">Popular Collection</div>
    <div class="menu-scroll" id="pop-list"></div>
  </div>

  <!-- Anime Details Modal -->
  <div id="detail-modal" class="modal">
    <div class="modal-content">
      <div style="color:var(--red); cursor:pointer; margin-bottom:20px;" onclick="closeModal()">BACK</div>
      <h1 id="m-title" style="margin: 0 0 10px 0;"></h1>
      <p id="m-desc" style="font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 30px;"></p>
      <div class="section-title" style="padding:0">Select Episode Range</div>
      <div class="season-tabs" id="season-tabs"></div>
      <div id="ep-list"></div>
    </div>
  </div>

  <!-- Secret Admin Panel (No Season Field) -->
  <div id="admin-panel" class="admin-modal">
    <div class="admin-box">
      <h2 style="color:var(--red); text-align:center;">ADMIN UPLOAD</h2>
      <input type="text" id="up-name" placeholder="Anime Name (e.g. Black Clover)">
      <input type="number" id="up-episode" placeholder="Episode Number">
      <label style="font-size: 10px; color: #444; margin-left: 5px;">SELECT FILE:</label>
      <input type="file" id="up-file">
      <button class="upload-btn" onclick="saveSubtitle()">UPLOAD SUBTITLE</button>
      <button style="background:none; border:none; color:#444; width:100%; margin-top:15px; cursor:pointer;" onclick="closeAdmin()">Cancel</button>
    </div>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let currentAnime = null;

    window.onload = () => {
      fetchList(`{Page(perPage:12){media(sort:TRENDING_DESC,type:ANIME){id title{english romaji}description bannerImage coverImage{large}episodes}}}`, "trend-list");
      fetchList(`{Page(perPage:12){media(sort:POPULARITY_DESC,type:ANIME){id title{english romaji}description bannerImage coverImage{large}episodes}}}`, "pop-list");
      lucide.createIcons();
    };

    async function fetchList(query, id) {
      const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query})});
      const d = await res.json();
      renderCards(d.data.Page.media, id);
    }

    function renderCards(list, id) {
      document.getElementById(id).innerHTML = list.map(a => `
        <div class="card" onclick='openDetails(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
          <img src="${a.coverImage.large}">
          <p>${(a.title.english || a.title.romaji)}</p>
        </div>`).join('');
    }

    function handleLogic(val) {
      if(val === "9999") { document.getElementById('admin-panel').style.display = 'flex'; document.getElementById('searchInput').value = ""; }
      else if(val.length > 2) { searchAnime(val); }
      else { document.getElementById('search-section').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; }
    }

    async function searchAnime(term) {
      const query = `query($s:String){Page(perPage:15){media(search:$s,type:ANIME){id title{english romaji}description bannerImage coverImage{large}episodes}}}`;
      const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s:term}})});
      const d = await res.json();
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('search-section').style.display = 'block';
      renderCards(d.data.Page.media, 'search-grid');
    }

    function openDetails(a) {
      currentAnime = a;
      document.getElementById('hero-bg').style.backgroundImage = `url('${a.bannerImage || a.coverImage.large}')`;
      document.getElementById('m-title').innerText = a.title.english || a.title.romaji;
      document.getElementById('m-desc').innerHTML = a.description;
      document.getElementById('detail-modal').style.display = 'block';
      let total = a.episodes || 1000;
      let sHtml = "";
      for(let i=1; i<=Math.ceil(total/24); i++) {
        sHtml += `<div class="tab ${i===1?'active':''}" onclick="renderEpisodes(${i}, this)">EP ${(i-1)*24+1}-${i*24}</div>`;
      }
      document.getElementById('season-tabs').innerHTML = sHtml;
      renderEpisodes(1);
    }

    function renderEpisodes(idx, el) {
      if(el) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }
      let start = (idx-1)*24+1, end = idx*24, total = currentAnime.episodes || 1000, html = "";
      for(let i=start; i<=end && i<=total; i++) {
        html += `<div class="ep-item"><span><b>Episode ${i}</b></span><button class="sub-btn" onclick="downloadSub(${i})">SUBTITLE</button></div>`;
      }
      document.getElementById('ep-list').innerHTML = html;
    }

    function saveSubtitle() {
      const name = document.getElementById('up-name').value.trim().toLowerCase();
      const ep = document.getElementById('up-episode').value;
      const file = document.getElementById('up-file').files[0]?.name || "Sub.srt";
      if(!name || !ep) return alert("නම සහ Episode එක ඇතුළත් කරන්න!");
      let db = JSON.parse(localStorage.getItem('final_db') || "[]");
      db.push({ name, ep, file });
      localStorage.setItem('final_db', JSON.stringify(db));
      alert(`සාර්ථකයි! ${name} E${ep} එක් විය.`);
      closeAdmin();
    }

    function downloadSub(epNum) {
      const currentTitle = (currentAnime.title.english || currentAnime.title.romaji).toLowerCase();
      let db = JSON.parse(localStorage.getItem('final_db') || "[]");
      const found = db.find(item => (currentTitle.includes(item.name) || item.name.includes(currentTitle)) && item.ep == epNum);
      if(found) alert("Downloading: " + found.file);
      else alert("තවමත් මෙම Episode එකට Subtitles එක් කර නැත.");
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
  </script>
</body>
</html>
