<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Kingdom | Pro Edition</title>
  <script src="https://unpkg.com"></script>
  <style>
    :root { --red: #ff3e3e; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
    
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: white; 
      font-family: 'Inter', sans-serif; overflow-x: hidden; 
      overscroll-behavior-y: contain;
    }

    /* Dynamic Immersive Background */
    #hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-size: cover; background-position: center;
      transition: background 0.8s ease; z-index: -2; filter: brightness(0.35);
    }
    
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background: linear-gradient(0deg, var(--bg) 25%, transparent 100%);
      z-index: -1;
    }

    header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
    .brand span { color: var(--red); }

    /* Modern Search Bar */
    .search-wrapper { padding: 0 25px; margin-bottom: 15px; }
    .search-container {
      display: flex; align-items: center; background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px;
      padding: 5px 15px; backdrop-filter: blur(15px);
    }
    .search-input {
      width: 100%; background: transparent !important; border: none !important;
      padding: 12px; color: white !important; outline: none !important; font-size: 16px;
    }

    /* Content Area */
    .info-panel { padding: 15px 25px; min-height: 180px; display: flex; flex-direction: column; justify-content: flex-end; }
    .meta { font-size: 11px; font-weight: 800; color: var(--red); text-transform: uppercase; margin-bottom: 5px; }
    .title { font-size: 32px; font-weight: 900; margin: 0; line-height: 1.1; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .desc { font-size: 14px; color: rgba(255,255,255,0.6); margin: 12px 0; height: 60px; overflow: hidden; line-height: 1.5; }

    /* Buttons */
    .btn-watch {
      background: white; color: black; border: none; padding: 15px 40px; border-radius: 50px;
      font-weight: 900; font-size: 15px; display: inline-flex; align-items: center; gap: 10px; cursor: pointer;
    }

    /* Horizontal Menu */
    .menu-scroll {
      display: flex; overflow-x: auto; gap: 18px; padding: 20px 25px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .menu-scroll::-webkit-scrollbar { display: none; }
    .card { min-width: 95px; transition: 0.4s; cursor: pointer; text-align: center; }
    .card img { width: 95px; height: 135px; border-radius: 15px; object-fit: cover; border: 3px solid transparent; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
    .card.active { transform: scale(1.1); }
    .card.active img { border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    .card p { font-size: 10px; margin-top: 10px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }

    /* Player Selection Modal (Anilab Style) */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 4000; display: none;
      backdrop-filter: blur(5px);
    }
    .player-modal {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #121212; border-radius: 30px 30px 0 0;
      padding: 30px 25px; box-sizing: border-box;
      border-top: 3px solid var(--red);
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .modal-header { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: white; display: flex; justify-content: space-between; }
    .player-opt {
      display: flex; align-items: center; gap: 15px; padding: 15px;
      background: #1c1c1c; margin-bottom: 12px; border-radius: 15px;
      cursor: pointer; border: 1px solid #333; transition: 0.2s;
    }
    .player-opt:active { transform: scale(0.98); background: #333; }
    .player-opt i { color: var(--red); }
    .player-text { font-weight: bold; font-size: 15px; }

  </style>
</head>
<body>

  <div id="hero-bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="brand">ANIME<span>KINGDOM</span></div>
    <div id="clock" style="font-size: 13px; font-weight: bold; opacity: 0.8;"></div>
  </header>

  <div class="search-wrapper">
    <div class="search-container">
      <i data-lucide="search" size="20" color="#ff3e3e"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search anime title..." oninput="handleSearch()">
    </div>
  </div>

  <div class="info-panel">
    <div class="meta" id="m-genres">Action • Fantasy</div>
    <h1 class="title" id="m-title">Loading...</h1>
    <p class="desc" id="m-desc">Select an anime to stream with your favorite player.</p>
    <button class="btn-watch" onclick="showPlayerMenu()">
      <i data-lucide="play" fill="black" size="20"></i> WATCH NOW
    </button>
  </div>

  <div class="menu-scroll" id="anime-list"></div>

  <!-- Player Selector Modal -->
  <div id="modal-bg" class="modal-overlay" onclick="hidePlayerMenu()">
    <div class="player-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        CHOOSE PLAYER
        <i data-lucide="x" onclick="hidePlayerMenu()" style="cursor:pointer;"></i>
      </div>
      
      <div class="player-opt" onclick="launchApp('splayer')">
        <i data-lucide="zap"></i>
        <div class="player-text">SPlayer (Direct Play)</div>
      </div>
      
      <div class="player-opt" onclick="launchApp('vlc')">
        <i data-lucide="cone"></i>
        <div class="player-text">VLC Media Player</div>
      </div>

      <div class="player-opt" onclick="launchApp('mx')">
        <i data-lucide="play-square"></i>
        <div class="player-text">MX Player</div>
      </div>

      <div class="player-opt" onclick="launchApp('browser')">
        <i data-lucide="globe"></i>
        <div class="player-text">Internal Browser Player</div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let current = null;
    let timer;

    async function loadData(query, vars = {}) {
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, variables: vars })
        });
        const json = await res.json();
        render(json.data.Page.media);
      } catch (e) { console.error("Error fetching data"); }
    }

    function render(list) {
      const container = document.getElementById('anime-list');
      container.innerHTML = list.map((a, i) => `
        <div class="card ${i===0?'active':''}" onclick="updateDisplay(${JSON.stringify(a).replace(/"/g, '&quot;')}, this)">
          <img src="${a.coverImage.large}">
          <p>${(a.title.english || a.title.romaji).substring(0, 15)}</p>
        </div>
      `).join('');
      if(list.length > 0) updateDisplay(list);
      lucide.createIcons();
    }

    function updateDisplay(anime, el) {
      current = anime;
      document.getElementById('hero-bg').style.backgroundImage = `url('${anime.bannerImage || anime.coverImage.extraLarge}')`;
      document.getElementById('m-title').innerText = anime.title.english || anime.title.romaji;
      document.getElementById('m-desc').innerHTML = anime.description;
      document.getElementById('m-genres').innerText = anime.genres.join(" • ");

      if(el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }

    function handleSearch() {
      const val = document.getElementById('searchInput').value;
      clearTimeout(timer);
      if(val.length < 2) { loadTrending(); return; }
      timer = setTimeout(() => {
        loadData(`query($s:String){Page(perPage:12){media(search:$s,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`, {s:val});
      }, 600);
    }

    function loadTrending() {
      loadData(`{Page(perPage:15){media(sort:TRENDING_DESC,type:ANIME){id title{english romaji}description bannerImage genres coverImage{extraLarge large}}}}`);
    }

    // --- External Player Launcher ---
    function showPlayerMenu() { if(current) document.getElementById('modal-bg').style.display = 'block'; }
    function hidePlayerMenu() { document.getElementById('modal-bg').style.display = 'none'; }

    function launchApp(type) {
      if(!current) return;
      // We use a high-quality embed server as a bridge
      const streamUrl = `https://www.2embed.cc{current.id}/1`;
      const title = current.title.english || current.title.romaji;
      let url = "";

      if(type === 'splayer') {
        // Correct SPlayer Package Intent
        url = `intent:${streamUrl}#Intent;package=com.sentis.splayer;S.title=${encodeURIComponent(title)};end`;
      } else if(type === 'vlc') {
        url = `intent:${streamUrl}#Intent;package=org.videolan.vlc;S.title=${encodeURIComponent(title)};end`;
      } else if(type === 'mx') {
        url = `intent:${streamUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(title)};end`;
      } else if(type === 'browser') {
        window.open(streamUrl, '_blank');
        hidePlayerMenu();
        return;
      }

      window.location.href = url;
      hidePlayerMenu();
    }

    // Init
    loadTrending();
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    lucide.createIcons();
  </script>
</body>
</html>
