<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANIME KINGDOM | Direct Stream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card-bg: #121212; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; padding: 20px; background: rgba(0,0,0,0.95); z-index: 1000; text-align: center; border-bottom: 1px solid #222; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: white; margin-bottom: 15px; cursor: pointer; }
        .logo span { color: var(--accent); }
        
        .search-area { display: flex; max-width: 500px; margin: 0 auto; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; height: 48px; overflow: hidden; }
        #searchInput { flex: 1; background: transparent; border: none; padding: 0 15px; color: white; outline: none; font-size: 15px; }

        .container { padding: 160px 20px 40px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(255,0,0,0.1); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title { font-size: 12px; padding: 10px; text-align: center; font-weight: 600; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Fullscreen Player */
        .player-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: none; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .btn-back { position: absolute; top: 20px; left: 20px; z-index: 10000; background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        #errorMsg { color: #ff4d4d; text-align: center; padding: 50px; width: 100%; font-weight: bold; line-height: 1.6; }
        #loader { text-align: center; padding: 50px; color: var(--accent); width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">ANIME<span>KINGDOM</span></div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Search anime library..." oninput="filterAnime()">
        </div>
    </header>

    <div class="container">
        <h3 id="listTitle" style="margin-bottom: 25px; border-left: 5px solid var(--accent); padding-left: 15px;">MY ANIME COLLECTION</h3>
        <div id="animeGrid" class="grid">
            <div id="loader"><i class="fas fa-spinner fa-spin"></i> Loading Data...</div>
        </div>
    </div>

    <!-- Fullscreen Player -->
    <div id="playerModal" class="player-modal">
        <button class="btn-back" onclick="closePlayer()"><i class="fas fa-arrow-left"></i> BACK</button>
        <iframe id="vFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        // ඔයාගේ නිවැරදි RAW Link එක
        const RAW_URL = "https://raw.githubusercontent.com"; 
        // CORS Error එක මගහරින්න Proxy එකක් පාවිච්චි කිරීම
        const PROXY_URL = "https://api.allorigins.win";
        
        let animeList = [];

        async function fetchAnime() {
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(RAW_URL));
                if (!response.ok) throw new Error('Data Fetching Failed');
                
                const data = await response.json();
                animeList = data;
                renderItems(animeList);
            } catch (err) {
                console.error(err);
                document.getElementById('animeGrid').innerHTML = `
                    <div id="errorMsg">
                        Error: ඇනිමේ දත්ත ලබා ගැනීමට නොහැකි විය.<br>
                        <small>(ඔබේ JSON file එකේ Format එක නිවැරදි දැයි බලන්න)</small><br><br>
                        <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Refresh Page</button>
                    </div>`;
            }
        }

        function renderItems(items) {
            const grid = document.getElementById('animeGrid');
            if (items.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%;'>No anime found.</p>";
                return;
            }
            grid.innerHTML = items.map(a => `
                <div class="card" onclick="playAnime('${a.id}')">
                    <img src="${a.poster}" alt="${a.title}" loading="lazy">
                    <div class="card-title">${a.title}</div>
                </div>
            `).join('');
        }

        function filterAnime() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = animeList.filter(x => x.title.toLowerCase().includes(query));
            renderItems(filtered);
        }

        function playAnime(id) {
            const modal = document.getElementById('playerModal');
            const frame = document.getElementById('vFrame');
            
            frame.src = `https://vidsrc.to{id}`; 
            modal.style.display = 'block';

            if (modal.requestFullscreen) modal.requestFullscreen();
            else if (modal.webkitRequestFullscreen) modal.webkitRequestFullscreen();

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => {});
            }
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('vFrame').src = "";
            if (document.exitFullscreen) document.exitFullscreen();
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        }

        window.onload = fetchAnime;
    </script>
</body>
</html>
