<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Search & Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: translateY(-8px); border: 2px solid #ffcc00; box-shadow: 0 0 20px rgba(255,204,0,0.2); }
        #video-overlay { display: none; background: rgba(0,0,0,0.98); }
    </style>
</head>
<body>

<!-- Video Overlay -->
<div id="video-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl relative">
        <div class="flex justify-between items-center mb-4">
            <h2 id="playing-title" class="text-[#ffcc00] font-bold truncate pr-4"></h2>
            <button onclick="stopVideo()" class="bg-red-600 px-4 py-1 rounded font-bold text-white">CLOSE X</button>
        </div>
        <div class="aspect-video bg-black rounded-xl overflow-hidden border-2 border-[#ffcc00] shadow-2xl">
            <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- Nav with Search Bar -->
<nav class="flex flex-col md:flex-row items-center justify-between px-6 py-4 bg-black/95 sticky top-0 z-50 border-b border-white/10 gap-4">
    <div class="flex items-center gap-3">
        <i class="fas fa-crown text-[#ffcc00] text-3xl"></i>
        <div>
            <span class="text-2xl font-black uppercase block tracking-tighter">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-none">Sinhala Subs Portal</span>
        </div>
    </div>
    
    <!-- හිතලා වැඩ කරන Search Bar එක -->
    <div class="relative w-full md:w-1/3">
        <input type="text" id="searchInput" oninput="searchKingdom()" placeholder="Anime සොයන්න (Search)..." class="w-full bg-zinc-900 border border-white/10 rounded-full py-2 px-10 focus:border-[#ffcc00] outline-none text-sm">
        <i class="fas fa-search absolute left-4 top-3 text-gray-500"></i>
    </div>
</nav>

<!-- Content -->
<div class="p-8 max-w-7xl mx-auto">
    <h2 id="grid-title" class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase tracking-widest mb-8 text-[#ffcc00]">ජනප්‍රිය ඇනිමේ (TRENDING)</h2>
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- AI Loading... -->
    </div>
</div>

<script>
    const ANILIST_URL = 'https://graphql.anilist.co';

    // දත්ත ගෙන්වා ගැනීමේ පොදු function එක
    async function fetchAniList(query, variables = {}) {
        const res = await fetch(ANILIST_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, variables })
        });
        return res.json();
    }

    // මුලින්ම Trending ඇනිමේ පෙන්වීම
    async function loadTrending() {
        const query = `query { Page(perPage: 18) { media(sort: TRENDING_DESC, type: ANIME) { title { english romaji } coverImage { large } } } }`;
        const { data } = await fetchAniList(query);
        render(data.Page.media);
    }

    // Search කරන විට ක්‍රියාත්මක වන කොටස
    async function searchKingdom() {
        const term = document.getElementById('searchInput').value;
        const titleElement = document.getElementById('grid-title');
        
        if (term.length > 2) {
            titleElement.innerText = "සොයන ප්‍රතිඵල: " + term;
            const query = `query ($search: String) { Page(perPage: 18) { media(search: $search, type: ANIME) { title { english romaji } coverImage { large } } } }`;
            const { data } = await fetchAniList(query, { search: term });
            render(data.Page.media);
        } else if (term.length === 0) {
            titleElement.innerText = "ජනප්‍රිය ඇනිමේ (TRENDING)";
            loadTrending();
        }
    }

    function render(list) {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = list.map(anime => {
            const title = anime.title.english || anime.title.romaji;
            return `
            <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 relative group" onclick="play('${title}')">
                <img src="${anime.coverImage.large}" class="w-full h-64 object-cover group-hover:opacity-40 transition-opacity">
                <div class="p-3">
                    <h3 class="text-[11px] font-bold truncate group-hover:text-[#ffcc00] transition-colors">${title}</h3>
                </div>
            </div>`;
        }).join('');
    }

    function play(title) {
        document.getElementById('playing-title').innerText = "නරඹන්නේ: " + title;
        document.getElementById('video-frame').src = `https://www.youtube.com{title}+sinhala+sub`;
        document.getElementById('video-overlay').style.display = 'flex';
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
    }

    window.onload = loadTrending;
</script>

</body>
</html>
