<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Kingdom | PS5 Elite Edition</title>
  <script src="https://unpkg.com"></script>
  <style>
    :root { --red: #ff3e3e; --bg: #050505; --glass: rgba(255, 255, 255, 0.1); }
    
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; }

    /* Dynamic Immersive Background */
    #hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover; background-position: center 20%;
      transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -2; transform: scale(1.1); /* පොඩි Zoom එකක් ලස්සනට */
    }
    
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at top right, transparent, var(--bg) 90%),
                  linear-gradient(0deg, var(--bg) 10%, transparent 100%);
      z-index: -1;
    }

    /* Modern Header */
    header { padding: 25px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
    .brand span { color: var(--red); }

    /* Floating Search */
    .search-area { padding: 0 25px; margin-bottom: 20px; }
    .search-bar {
      background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 18px;
      display: flex; align-items: center; padding: 5px 15px; transition: 0.4s;
    }
    .search-bar:focus-within { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .search-input { width: 100%; background: none; border: none; padding: 12px; color: white; outline: none; font-size: 15px; }

    /* Anime Info */
    .info-box { padding: 20px 25px; min-height: 220px; display: flex; flex-direction: column; justify-content: flex-end; }
    .meta { font-size: 11px; font-weight: 800; color: var(--red); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1.5px; }
    .title { font-size: 38px; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 5px 20px rgba(0,0,0,0.8); }
    .desc { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; margin: 15px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* Horizontal Menu - PS5 Style */
    .menu-container { padding: 20px 0 40px 25px; }
    .menu-scroll { display: flex; overflow-x: auto; gap: 18px; scrollbar-width: none; padding-right: 25px; }
    .menu-scroll::-webkit-scrollbar { display: none; }
    
    .card { min-width: 100px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
    .card img { width: 100px; height: 140px; border-radius: 15px; object-fit: cover; border: 3px solid transparent; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    .card.active { transform: scale(1.15) translateY(-10px); }
    .card.active img { border-color: white; box-shadow: 0 0 25px rgba(255,255,255,0.3); }
    .card p { font-size: 10px; margin-top: 10px; text-align: center; opacity: 0; transition: 0.3s; font-weight: bold; }
    .card.active p { opacity: 1; }

    /* Watch Button */
    .btn-row { display: flex; gap: 15px; }
    .play-btn {
      background: white; color: black; border: none; padding: 15px 35px; border-radius: 40px;
      font-weight: 900; font-size: 15px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: 0.3s;
    }
    .play-btn:active { transform: scale(0.95); }

    /* Multi-Server Player Overlay */
    #player-view {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black;
      z-index: 2000; display: none; flex-direction: column;
    }
    .player-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
  </style>
</head>
<body>

  <div id="hero-bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="brand">ANIME<span>KINGDOM</span></div>
    <div id="time" style="font-size: 13px; font-weight: 600;"></div>
  </header>

  <div class="search-area">
    <div class="search-bar">
      <i data-lucide="search" size="18" color="#ff3e3e"></i>
      <input type="text" id="q" class="search-input" placeholder="Search titles, genres..." oninput="search()">
    </div>
  </div>

  <div class="info-box">
    <div class="meta" id="m-genres">Action • Fantasy</div>
    <h1 class="title" id="m-title">Loading...</h1>
    <p class="desc" id="m-desc">Fetching the best anime for you.</p>
    <div class="btn-row">
      <button class="play-btn" onclick="play()">
        <i data-lucide="play" fill="black" size="20"></i> WATCH NOW
      </button>
    </div>
  </div>

  <div class="menu-container">
    <div class="menu-scroll" id="list"></div>
  </div>

  <!-- Video Player -->
  <div id="player-view">
    <div class="player-header">
      <div id="p-name" style="font-weight: bold; font-size: 14px;"></div>
      <button onclick="closeP()" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">EXIT ×</button>
    </div>
    <iframe id="venom-player" src="" style="width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
  </div>

  <script>
    const API = "https://graphql.anilist.co";
    let cur = null;

    async function load(query, vars = {}) {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: vars })
      });
      const json = await res.json();
      const items = json.data.Page.media;
      render(items);
    }

    function render(list) {
      const container = document.getElementById('list');
      container.innerHTML = list.map((a, i) => `
        <div class="card ${i===0?'active':''}" onclick="sel(${JSON.stringify(a).replace(/"/g, '&quot;')}, this)">
          <img src="${a.coverImage.large}">
          <p>${(a.title.english || a.title.romaji).substring(0,15)}...</p>
        </div>
      `).join('');
      if(list[0]) sel(list[0]);
    }

    function sel(a, el) {
      cur = a;
      document.getElementById('hero-bg').style.backgroundImage = `url('${a.bannerImage || a.coverImage.extraLarge}')`;
      document.getElementById('m-title').innerText = a.title.english || a.title.romaji;
      document.getElementById('m-desc').innerHTML = a.description;
      document.getElementById('m-genres').innerText = a.genres.join(" • ");

      if(el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }

    function search() {
      const val = document.getElementById('q').value;
      if(val.length < 2) return;
      load(`query($s:String){Page(perPage:10){media(search:$s,type:ANIME){title{english romaji}description bannerImage genres coverImage{extraLarge large}id}}}`, {s:val});
    }

    function play() {
      if(!cur) return;
      const player = document.getElementById('player-view');
      const frame = document.getElementById('venom-player');
      // Advance Multi-server link (2Embed is reliable for most titles)
      frame.src = `https://www.2embed.cc{cur.id}/1`;
      document.getElementById('p-name').innerText = cur.title.english || cur.title.romaji;
      player.style.display = 'flex';
    }

    function closeP() {
      document.getElementById('player-view').style.display = 'none';
      document.getElementById('venom-player').src = '';
    }

    // Trending on start
    load(`{Page(perPage:15){media(sort:TRENDING_DESC,type:ANIME){title{english romaji}description bannerImage genres coverImage{extraLarge large}id}}}`);

    // Clock & Icons
    lucide.createIcons();
    setInterval(() => {
      document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);
  </script>
</body>
</html>
