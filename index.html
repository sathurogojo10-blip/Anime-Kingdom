<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kingdom | Stream & Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .anime-card:hover { transform: translateY(-10px); border: 2px solid #ffcc00; }
        #video-overlay { display: none; background: rgba(0,0,0,1); }
        .action-btn { transition: 0.3s; background: #1a1a1a; border: 1px solid #333; }
        .action-btn:hover { background: #ffcc00; color: black; border-color: #ffcc00; }
        .download-btn { background: #22c55e; color: white; font-weight: bold; padding: 10px 20px; border-radius: 8px; transition: 0.3s; }
        .download-btn:hover { background: #16a34a; transform: scale(1.05); }
    </style>
</head>
<body>

<!-- Player & Download Overlay -->
<div id="video-overlay" class="fixed inset-0 z-50 flex flex-col p-4 md:p-8 overflow-y-auto">
    <div class="max-w-5xl mx-auto w-full">
        <div class="flex justify-between items-center mb-6">
            <h2 id="playing-title" class="text-xl md:text-2xl font-bold text-[#ffcc00] pr-4 uppercase"></h2>
            <button onclick="stopVideo()" class="bg-red-600 px-6 py-2 rounded-full font-bold">CLOSE X</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div class="aspect-video w-full rounded-xl overflow-hidden border-2 border-[#ffcc00]">
                    <iframe id="video-frame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                </div>
                
                <!-- Download Section -->
                <div class="mt-6 p-6 bg-zinc-900 rounded-2xl border border-white/10 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h3 class="font-bold text-lg">Download This Episode</h3>
                        <p class="text-xs text-gray-400">High Quality Video + Subtitles</p>
                    </div>
                    <div class="flex gap-3">
                        <button id="dl-video" onclick="downloadContent('video')" class="download-btn"><i class="fas fa-download mr-2"></i> VIDEO</button>
                        <button id="dl-sub" onclick="downloadContent('sub')" class="download-btn bg-blue-600 hover:bg-blue-700"><i class="fas fa-file-alt mr-2"></i> SUBTITLE</button>
                    </div>
                </div>
            </div>

            <!-- Episodes List -->
            <div class="bg-zinc-900 p-6 rounded-2xl h-[400px] lg:h-[500px] border border-white/10 flex flex-col">
                <h3 class="font-bold mb-4 border-b border-white/10 pb-2">EPISODES</h3>
                <div id="ep-list" class="grid grid-cols-4 lg:grid-cols-3 gap-2 overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>
</div>

<!-- Nav -->
<nav class="flex flex-col md:flex-row items-center justify-between px-8 py-6 bg-black sticky top-0 z-40 border-b border-white/5 gap-6">
    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
        <i class="fas fa-crown text-[#ffcc00] text-4xl"></i>
        <span class="text-3xl font-black uppercase">Anime <span class="text-[#ffcc00]">Kingdom</span></span>
    </div>
    <div class="relative w-full md:w-1/3">
        <input type="text" id="searchInput" oninput="searchKingdom()" placeholder="සොයන්න (Search)..." class="w-full bg-zinc-900 border border-white/10 rounded-full py-3 px-12 focus:border-[#ffcc00] outline-none text-white">
        <i class="fas fa-search absolute left-5 top-4 text-gray-500"></i>
    </div>
</nav>

<!-- Main Grid -->
<div class="p-8 max-w-7xl mx-auto">
    <h2 class="text-2xl font-bold border-l-4 border-[#ffcc00] pl-4 uppercase mb-10 text-[#ffcc00]">Trending Now</h2>
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
</div>

<script>
    const ANILIST_URL = 'https://graphql.anilist.co';
    let currentId = '';
    let currentEp = 1;
    let currentTitle = '';

    async function loadTrending() {
        const query = `query { Page(perPage: 30) { media(sort: TRENDING_DESC, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
        const res = await fetch(ANILIST_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
        const { data } = await res.json();
        render(data.Page.media);
    }

    async function searchKingdom() {
        const term = document.getElementById('searchInput').value;
        if (term.length > 2) {
            const query = `query ($search: String) { Page(perPage: 18) { media(search: $search, type: ANIME) { idMal title { english romaji } coverImage { large } episodes } } }`;
            const res = await fetch(ANILIST_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: { search: term } }) });
            const { data } = await res.json();
            render(data.Page.media);
        } else if (term.length === 0) { loadTrending(); }
    }

    function render(list) {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = list.map(anime => {
            const title = anime.title.english || anime.title.romaji;
            return `
            <div class="anime-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer transition-all duration-300 group" onclick="openPlayer('${anime.idMal}', '${title}', ${anime.episodes || 12})">
                <img src="${anime.coverImage.large}" class="w-full h-64 object-cover">
                <div class="p-3 text-center">
                    <h3 class="text-[10px] font-bold truncate uppercase">${title}</h3>
                </div>
            </div>`;
        }).join('');
    }

    function openPlayer(id, title, epCount) {
        currentId = id;
        currentTitle = title;
        document.getElementById('playing-title').innerText = title;
        document.getElementById('video-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        const epList = document.getElementById('ep-list');
        epList.innerHTML = '';
        for(let i = 1; i <= (epCount || 1); i++) {
            epList.innerHTML += `<button onclick="playEp(${i})" class="action-btn py-3 rounded-lg font-bold text-xs">${i}</button>`;
        }
        playEp(1);
    }

    function playEp(ep) {
        currentEp = ep;
        const frame = document.getElementById('video-frame');
        // වඩාත් ස්ථාවර Player එකක්
        frame.src = `https://vidsrc.cc{currentId}/${ep}`;
    }

    // Download Logic
    function downloadContent(type) {
        if(type === 'video') {
            // ප්‍රධාන ඇනිමේ ඩවුන්ලෝඩ් සේවාවකට සම්බන්ධ කිරීම
            window.open(`https://panyadownloader.com{currentId}`, '_blank');
        } else {
            // උපසිරසි සෙවීමට (Subscene/AniSub) සම්බන්ධ කිරීම
            window.open(`https://subscene.com{encodeURIComponent(currentTitle)}`, '_blank');
        }
    }

    function stopVideo() {
        document.getElementById('video-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
        document.body.style.overflow = 'auto';
    }

    window.onload = loadTrending;
</script>

</body>
</html>
