<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Kingdom | PS5 Style</title>
  <style>
    :root { --primary-red: #e74c3c; --bg-dark: #0a0a0a; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }

    /* Background Dynamic Image */
    .hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-size: cover; background-position: center;
      transition: background 0.8s ease-in-out;
      z-index: -1;
      filter: brightness(0.4) saturate(1.2);
    }
    .hero-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, var(--bg-dark) 10%, transparent 100%);
      z-index: -1;
    }

    /* Logo Section */
    header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: bold; text-transform: uppercase; }
    .logo .red { color: var(--primary-red); }

    /* PS5 style Game Cards (Horizontal Scroll) */
    .menu-scroll {
      display: flex; overflow-x: auto; padding: 20px; gap: 12px;
      scrollbar-width: none; /* Firefox */
    }
    .menu-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .game-card {
      min-width: 80px; text-align: center; transition: 0.3s; cursor: pointer;
    }
    .game-card img {
      width: 80px; height: 80px; border-radius: 12px; 
      border: 3px solid transparent; transition: 0.3s; object-fit: cover;
    }
    .game-card.active img { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px white; }
    .game-card p { font-size: 11px; margin-top: 8px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 80px; }

    /* Info Section (Middle like PS5) */
    .anime-details { padding: 40px 20px; min-height: 300px; }
    .anime-details h1 { font-size: 32px; margin: 0; text-transform: uppercase; }
    .anime-details .meta { color: var(--primary-red); font-weight: bold; margin: 10px 0; font-size: 14px; }
    .anime-details p { font-size: 14px; line-height: 1.6; color: #ccc; max-width: 90%; height: 100px; overflow-y: auto; }

    /* Play Button */
    .btn-play {
      background: white; color: black; border: none; padding: 12px 30px;
      border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: 20px;
    }

    footer { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>

  <div id="hero-bg" class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <header>
    <div class="logo">Anime<span class="red">Kingdom</span></div>
    <div style="font-size: 18px;">🔍</div>
  </header>

  <!-- PS5 Style Menu -->
  <div class="menu-scroll" id="menu-list">
    <!-- Cards will load here -->
  </div>

  <!-- Anime Details Area -->
  <div class="anime-details" id="anime-info">
    <div class="meta" id="anime-genre">GENRE</div>
    <h1 id="anime-title">Select Anime</h1>
    <p id="anime-desc">Loading the latest trending anime for you...</p>
    <button class="btn-play">▶ Play Now</button>
  </div>

  <footer>© Anime Kingdom | PS5 UI Inspired</footer>

  <script>
    const API_URL = "https://graphql.anilist.co";
    let animeData = [];

    async function fetchTrending() {
      const query = `
      {
        Page(page: 1, perPage: 10) {
          media(sort: TRENDING_DESC, type: ANIME) {
            id
            title { english romaji }
            description
            bannerImage
            coverImage { large }
            genres
          }
        }
      }`;

      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await response.json();
      animeData = data.data.Page.media;
      renderMenu();
    }

    function renderMenu() {
      const menu = document.getElementById('menu-list');
      menu.innerHTML = animeData.map((anime, index) => `
        <div class="game-card ${index === 0 ? 'active' : ''}" onclick="updateHero(${index}, this)">
          <img src="${anime.coverImage.large}" alt="cover">
          <p>${anime.title.english || anime.title.romaji}</p>
        </div>
      `).join('');

      // Load first anime by default
      if(animeData.length > 0) updateHero(0);
    }

    function updateHero(index, element) {
      const anime = animeData[index];
      
      // Update UI
      document.getElementById('hero-bg').style.backgroundImage = `url('${anime.bannerImage || anime.coverImage.large}')`;
      document.getElementById('anime-title').innerText = anime.title.english || anime.title.romaji;
      document.getElementById('anime-genre').innerText = anime.genres.slice(0, 2).join(" • ");
      document.getElementById('anime-desc').innerHTML = anime.description ? anime.description.substring(0, 150) + "..." : "No description available.";

      // Update Active State
      if(element) {
        document.querySelectorAll('.game-card').forEach(card => card.classList.remove('active'));
        element.classList.add('active');
      }
    }

    fetchTrending();
  </script>
</body>
</html>
