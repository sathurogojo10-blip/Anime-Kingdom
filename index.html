<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Kingdom | Streaming</title>
  <style>
    :root { --primary-red: #e74c3c; --bg-dark: #050505; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }

    /* Dynamic Background */
    .hero-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-size: cover; background-position: center;
      transition: 1s ease-in-out; z-index: -2; filter: brightness(0.3) blur(2px);
    }
    .hero-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, var(--bg-dark) 20%, transparent 100%);
      z-index: -1;
    }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 18px; font-weight: bold; }
    .logo span { color: var(--primary-red); }

    /* PS5 Menu Scroll */
    .menu-scroll {
      display: flex; overflow-x: auto; padding: 20px; gap: 15px;
      scrollbar-width: none;
    }
    .menu-scroll::-webkit-scrollbar { display: none; }

    .anime-item { min-width: 90px; text-align: center; cursor: pointer; transition: 0.3s; }
    .anime-item img {
      width: 85px; height: 110px; border-radius: 10px; 
      border: 3px solid transparent; object-fit: cover;
    }
    .anime-item.active img { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
    .anime-item p { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Content Area */
    .content { padding: 20px; margin-top: 20px; }
    .content h1 { font-size: 28px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    .content .meta { color: var(--primary-red); font-weight: bold; margin: 10px 0; }
    .content p { font-size: 14px; line-height: 1.5; color: #ddd; max-height: 120px; overflow-y: auto; }

    /* Video Player (Hidden initially) */
    #player-container {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: black; z-index: 2000;
    }
    iframe { width: 100%; height: 100%; border: none; }
    .close-player {
      position: absolute; top: 20px; right: 20px; background: var(--primary-red);
      color: white; border: none; padding: 10px 20px; border-radius: 5px; z-index: 2001;
    }

    .btn-watch {
      background: white; color: black; border: none; padding: 15px 40px;
      border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer;
      margin-top: 20px; transition: 0.3s;
    }
    .btn-watch:hover { background: var(--primary-red); color: white; }
  </style>
</head>
<body>

  <div id="hero-bg" class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <header>
    <div class="logo">ANIME<span>KINGDOM</span></div>
    <div>10:46 AM</div>
  </header>

  <!-- PS5 Icon List -->
  <div class="menu-scroll" id="anime-list">
    <!-- API Data will load here -->
  </div>

  <div class="content" id="anime-details">
    <div class="meta" id="genre-list">GENRE</div>
    <h1 id="main-title">Select an Anime</h1>
    <p id="main-desc">Explore the world of anime with PS5 style interface.</p>
    <button class="btn-watch" onclick="playAnime()">▶ WATCH NOW</button>
  </div>

  <!-- Video Player Screen -->
  <div id="player-container">
    <button class="close-player" onclick="closePlayer()">CLOSE ×</button>
    <iframe id="video-iframe" src="" allowfullscreen></iframe>
  </div>

  <script>
    const ANILIST_API = "https://graphql.anilist.co";
    let currentAnime = null;

    // 1. Fetch Trending Anime
    async function loadAnime() {
      const query = `
      {
        Page(page: 1, perPage: 15) {
          media(sort: TRENDING_DESC, type: ANIME) {
            id
            title { english romaji }
            description
            bannerImage
            coverImage { large }
            genres
          }
        }
      }`;

      const response = await fetch(ANILIST_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await response.json();
      const list = data.data.Page.media;
      renderMenu(list);
    }

    function renderMenu(list) {
      const container = document.getElementById('anime-list');
      container.innerHTML = list.map((anime, index) => `
        <div class="anime-item ${index === 0 ? 'active' : ''}" onclick="selectAnime(${JSON.stringify(anime).replace(/"/g, '&quot;')}, this)">
          <img src="${anime.coverImage.large}">
          <p>${anime.title.english || anime.title.romaji}</p>
        </div>
      `).join('');
      
      selectAnime(list[0]); // Load first one
    }

    function selectAnime(anime, el) {
      currentAnime = anime;
      document.getElementById('hero-bg').style.backgroundImage = `url('${anime.bannerImage || anime.coverImage.large}')`;
      document.getElementById('main-title').innerText = anime.title.english || anime.title.romaji;
      document.getElementById('main-desc').innerHTML = anime.description;
      document.getElementById('genre-list').innerText = anime.genres.join(" • ");

      if(el) {
        document.querySelectorAll('.anime-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
      }
    }

    // 2. Play Function (Simulating Anilab logic)
    function playAnime() {
      if(!currentAnime) return;
      
      // Anilab වල වගේම මෙහිදී අපි Consumet/GogoAnime වැනි Embed player එකක් පාවිච්චි කරනවා
      // උදාහරණයක් ලෙස: අදාළ නම ඇතුළත් කර streaming සයිට් එකකට ලින්ක් කිරීම
      const searchTitle = currentAnime.title.romaji.toLowerCase().replace(/\s+/g, '-');
      const playerUrl = `https://www.highquality.cam{searchTitle}-episode-1`; 
      
      // සටහන: සැබෑ streaming සර්වර් එකකට API එකක් හරහා ලින්ක් කිරීම මෙහිදී සිදුකළ හැක.
      document.getElementById('video-iframe').src = playerUrl;
      document.getElementById('player-container').style.display = 'block';
    }

    function closePlayer() {
      document.getElementById('player-container').style.display = 'none';
      document.getElementById('video-iframe').src = '';
    }

    loadAnime();
  </script>
</body>
</html>
