<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANIME KINGDOM | Advanced Stream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card-bg: #121212; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; padding: 20px; background: rgba(0,0,0,0.9); z-index: 1000; text-align: center; border-bottom: 1px solid #222; }
        .search-area { display: flex; max-width: 500px; margin: 10px auto; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; height: 45px; overflow: hidden; }
        #searchInput { flex: 1; background: transparent; border: none; padding: 0 15px; color: white; outline: none; }

        .container { padding: 150px 20px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-title { font-size: 12px; padding: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- EPISODE SELECTION MODAL --- */
        .info-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .info-content { background: #111; width: 100%; max-width: 600px; border-radius: 15px; overflow-y: auto; max-height: 90vh; border: 1px solid #333; position: relative; }
        .banner { width: 100%; height: 150px; object-fit: cover; }
        .info-body { padding: 20px; }
        .ep-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .ep-btn { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 12px; text-align: center; }
        .ep-btn:hover { background: var(--accent); border-color: var(--accent); }
        .close-info { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }

        /* --- CLEAN PLAYER --- */
        .player-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .floating-back { position: absolute; top: 20px; left: 20px; z-index: 10000; background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 20px; font-weight: 900; margin-bottom: 10px;">ANIME<span>KINGDOM</span></div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="AniList එකෙන් ඕනෑම ඇනිමේ එකක් හොයන්න..." onkeypress="if(event.key==='Enter') searchAnime()">
            <button onclick="searchAnime()" style="background:var(--accent); border:none; width:50px; color:white;"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="container">
        <h3 id="status" style="margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 10px;">TRENDING NOW</h3>
        <div id="animeGrid" class="grid"></div>
    </div>

    <!-- Episode Selector Modal -->
    <div id="infoModal" class="info-modal">
        <div class="info-content">
            <button class="close-info" onclick="closeInfo()">✕</button>
            <img id="mBanner" class="banner">
            <div class="info-body">
                <h2 id="mTitle">Anime Title</h2>
                <p id="mDesc" style="font-size: 13px; color: #aaa; margin: 10px 0; max-height: 100px; overflow-y: auto;"></p>
                <div style="font-size: 14px; font-weight: bold; margin-top: 20px;">EPISODES SELECT:</div>
                <div id="epGrid" class="ep-grid"></div>
            </div>
        </div>
    </div>

    <!-- Hidden Video Player -->
    <div id="playerModal" class="player-modal">
        <button class="floating-back" onclick="closePlayer()">◀ BACK</button>
        <iframe id="vFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        const API = "https://graphql.anilist.co";
        let currentAnime = null;

        window.onload = () => searchAnime();

        async function searchAnime() {
            const val = document.getElementById('searchInput').value;
            // AniList එකෙන් episodes ගණන, banner පවා ලබා ගැනීම
            const query = `query{Page(perPage:24){media(${val ? `search:"${val}"` : 'sort:TRENDING_DESC'},type:ANIME){id title{english romaji}coverImage{large}bannerImage description episodes}}}`;
            
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query})});
            const d = await res.json();
            renderGrid(d.data.Page.media);
        }

        function renderGrid(data) {
            document.getElementById('animeGrid').innerHTML = data.map(a => {
                const t = a.title.english || a.title.romaji;
                return `<div class="card" onclick="openInfo(${JSON.stringify(a).replace(/"/g, '&quot;')})">
                    <img src="${a.coverImage.large}">
                    <div class="card-title">${t}</div>
                </div>`;
            }).join('');
        }

        function openInfo(anime) {
            currentAnime = anime;
            document.getElementById('infoModal').style.display = 'flex';
            document.getElementById('mTitle').innerText = anime.title.english || anime.title.romaji;
            document.getElementById('mBanner').src = anime.bannerImage || anime.coverImage.large;
            document.getElementById('mDesc').innerHTML = anime.description || "No description available.";
            
            // Episode Buttons හැදීම
            const epCount = anime.episodes || 12; // AniList එකෙන් ලැබෙන episode ගණන
            let epHtml = "";
            for(let i=1; i<=epCount; i++) {
                epHtml += `<button class="ep-btn" onclick="playEpisode(${anime.id}, ${i})">Ep ${i}</button>`;
            }
            document.getElementById('epGrid').innerHTML = epHtml;
        }

        function playEpisode(id, ep) {
            const playerModal = document.getElementById('playerModal');
            const frame = document.getElementById('vFrame');
            
            // HiAnime source එකෙන් වීඩියෝව පමණක් ලබා ගැනීම
            // මෙහිදී කිසිදු HiAnime detail එකක් පෙන්වන්නේ නැත
            frame.src = `https://vidsrc.to{id}/${ep}`; 
            
            playerModal.style.display = 'block';

            // Auto-Rotate සහ Fullscreen (Mobile සඳහා)
            if (playerModal.requestFullscreen) playerModal.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }

        function closeInfo() { document.getElementById('infoModal').style.display = 'none'; }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('vFrame').src = "";
            if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
